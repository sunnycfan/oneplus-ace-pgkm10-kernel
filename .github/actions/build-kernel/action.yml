name: 'Build OnePlus Kernel with ReSukiSU'

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string

  ksu_type:
    description: 'Select KSU Type'
    required: true
    default: RSKSU

  ksu_branch_or_hash:
    description: 'ReSukiSU branch, tag, or commit hash'
    required: false
    type: string
    default: ""

  susfs_commit_hash_or_branch:
    description: 'SUSFS branch or commit hash'
    required: false
    type: string
    default: ""

  enable_adios:
    description: 'Enable ADIOS I/O scheduler support'
    required: false
    type: boolean
    default: false

  build_timestamp:
    description: 'Custom kernel build timestamp shown in uname -a, e.g. "Tue Feb 10 10:01:02 UTC 2026". Leave empty to use current UTC time.'
    required: false
    type: string
    default: ''

  optimize_level:
    description: 'Compiler optimization level (O2 or O3)'
    required: false
    type: string
    default: O2

  clean:
    description: 'Force clean build without ccache acceleration'
    required: false
    type: boolean
    default: false

  debug:
    description: 'Enable dumping debug related artifacts'
    required: false
    type: boolean
    default: false

  github_token:
    description: 'GitHub Token'
    required: true

outputs:
  kernel_version:
    description: 'Full kernel version string'
    value: ${{ steps.save_metadata.outputs.kernel_version }}

  ksu_version:
    description: 'ReSukiSU version number'
    value: ${{ steps.save_metadata.outputs.ksu_version }}

  ksu_type:
    description: 'KernelSU Variant'
    value: ${{ steps.save_metadata.outputs.ksu_type }}

  susfs_version:
    description: 'SUSFS version string'
    value: ${{ steps.save_metadata.outputs.susfs_version }}

  build_timestamp:
    description: 'Effective kernel build timestamp used in uname -a'
    value: ${{ steps.save_metadata.outputs.build_timestamp }}

  image_sha256:
    description: 'SHA256 hash of kernel Image'
    value: ${{ steps.collect_stats.outputs.image_sha256 }}

  zip_sha256:
    description: 'SHA256 hash of AnyKernel3 Zip'
    value: ${{ steps.create_zip.outputs.zip_sha256 }}

  warnings:
    description: 'Number of compiler warnings'
    value: ${{ steps.collect_stats.outputs.warnings_count }}

  build_time:
    description: 'Total build time in seconds'
    value: ${{ steps.collect_stats.outputs.build_time }}

  ccache_hit_rate:
    description: 'ccache hit rate percentage'
    value: ${{ steps.ccache_stats.outputs.hit_rate }}

  ccache_direct_rate:
    description: 'ccache direct hit rate percentage'
    value: ${{ steps.ccache_stats.outputs.direct_rate }}

  zip_name:
    description: 'Name of the generated flashable ZIP'
    value: ${{ steps.create_zip.outputs.zip_name }}

runs:
  using: 'composite'
  steps:
    - name: Get Action info
      shell: bash
      env:
        ACTION_REPO_VAL: ${{ github.action_repository }}
        ACTION_REF_VAL: ${{ github.action_ref }}
        REPOSITORY_VAL: ${{ github.repository }}
        REF_NAME_VAL: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        ACTION_REPO="${ACTION_REPO_VAL:-$REPOSITORY_VAL}"
        ACTION_REF="${ACTION_REF_VAL:-$REF_NAME_VAL}"

        echo "ACTION_REPO=$ACTION_REPO" >> "$GITHUB_ENV"
        echo "ACTION_REF=$ACTION_REF"   >> "$GITHUB_ENV"

        echo "Action repository: $ACTION_REPO"
        echo "Action ref:        $ACTION_REF"

    - name: 📥 Checkout Code
      uses: actions/checkout@v6
      with:
        repository: ${{ env.ACTION_REPO }}
        ref: ${{ env.ACTION_REF }}
        path: action-source
        fetch-depth: 1
    
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
       
        echo "::add-mask::${{ inputs.github_token }}"

        cat > /tmp/config.json <<'JSONEOF'
        ${{ inputs.op_config_json }}
        JSONEOF

        jq empty /tmp/config.json
        
        NESTED="$(jq -r '[to_entries[] | select(.value | type == "object" or type == "array")] | length' /tmp/config.json)"
        if [ "$NESTED" -gt 0 ]; then
          echo "::error::op_config_json must contain only scalar values (found $NESTED nested object/array)"
          exit 1
        fi
        
        REQUIRED_KEYS=(
          model soc branch manifest android_version kernel_version os_version
          hmbird susfs bbg bbr ttl ip_set rust_build lto uname unicode ds ntsync
        )

        missing_keys=()
        for key in "${REQUIRED_KEYS[@]}"; do
          if ! jq -e --arg k "$key" 'has($k)' /tmp/config.json >/dev/null 2>&1; then
            missing_keys+=("$key")
          fi
        done

        if [ "${#missing_keys[@]}" -ne 0 ]; then
          echo "::error::op_config_json is missing required keys: ${missing_keys[*]}"
          exit 1
        fi
        
        DELIM="GHDELIM_$(openssl rand -hex 8)"

        jq -r --arg delim "$DELIM" '
          to_entries[]
          | "OP_\(.key | ascii_upcase)<<\($delim)\n\(.value|tostring)\n\($delim)"
        ' /tmp/config.json >> "$GITHUB_ENV"

        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Validate KSU Type
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ inputs.ksu_type }}" != "RSKSU" ]; then
          echo "::error::This action only supports RSKSU/ReSukiSU. Got: ${{ inputs.ksu_type }}"
          exit 1
        fi

        echo "✅ KSU type validated: ${{ inputs.ksu_type }}"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        model="${OP_MODEL:-}"
        soc="${OP_SOC:-}"
        branch="${OP_BRANCH:-}"
        manifest="${OP_MANIFEST:-}"
        android_version="${OP_ANDROID_VERSION:-}"
        kernel_version="${OP_KERNEL_VERSION:-}"
        os_version="${OP_OS_VERSION:-}"
        hmbird="${OP_HMBIRD:-}"
        susfs="${OP_SUSFS:-}"
        bbg="${OP_BBG:-}"
        bbr="${OP_BBR:-}"
        ttl="${OP_TTL:-}"
        ip_set="${OP_IP_SET:-}"
        rust_build="${OP_RUST_BUILD:-}"
        lto="${OP_LTO:-}"
        uname="${OP_UNAME:-}"
        unicode="${OP_UNICODE:-}"
        ds="${OP_DS:-}"
        ntsync="${OP_NTSYNC:-}"
        optimize='${{ inputs.optimize_level }}'
        build_timestamp='${{ inputs.build_timestamp }}'

        errors=()

        if [[ -z "$model" ]]; then
          errors+=("Input 'model' cannot be empty")
        elif [[ ! "$model" =~ ^OP ]]; then
          errors+=("Input 'model' does not start with 'OP'. Got: '$model'")
        fi

        if [[ -z "$soc" ]]; then
          errors+=("Input 'soc' cannot be empty")
        elif [[ ! "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          errors+=("Input 'soc' contains invalid characters. Got: '$soc'")
        fi

        if [[ -z "$branch" ]]; then
          errors+=("Input 'branch' cannot be empty")
        elif [[ ! "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          errors+=("Input 'branch' contains invalid characters. Got: '$branch'")
        fi

        if [[ -z "$manifest" ]]; then
          errors+=("Input 'manifest' cannot be empty")
        elif [[ "$manifest" == http*://* ]]; then
          if [[ ! "$manifest" =~ ^https:// ]]; then
            errors+=("Manifest URL must be HTTPS. Got: '$manifest'")
          fi
          if [[ ! "$manifest" =~ \.xml($|\?) ]]; then
            errors+=("Manifest URL should point to an XML file. Got: '$manifest'")
          fi
        else
          if [[ ! "$manifest" =~ \.xml$ ]]; then
            errors+=("Manifest filename must end with .xml. Got: '$manifest'")
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            errors+=("Manifest filename cannot contain spaces. Got: '$manifest'")
          fi
        fi

        if [[ -z "$android_version" ]]; then
          errors+=("Input 'android_version' cannot be empty")
        elif [[ ! "$android_version" =~ ^android[0-9]+$ ]]; then
          errors+=("Input 'android_version' must be android followed by a number. Got: '$android_version'")
        fi

        if [[ -z "$kernel_version" ]]; then
          errors+=("Input 'kernel_version' cannot be empty")
        elif [[ ! "$kernel_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
          errors+=("Input 'kernel_version' must be X.Y format. Got: '$kernel_version'")
        fi

        if [[ -z "$os_version" ]]; then
          errors+=("Input 'os_version' cannot be empty")
        elif [[ ! "$os_version" =~ ^OOS ]]; then
          errors+=("Input 'os_version' does not start with OOS. Got: '$os_version'")
        fi

        for bool_name in hmbird susfs bbg bbr ttl ip_set rust_build unicode ds ntsync; do
          bool_value="${!bool_name}"
          if [[ -z "$bool_value" ]]; then
            errors+=("Input '$bool_name' cannot be empty")
          elif [[ "$bool_value" != "true" && "$bool_value" != "false" ]]; then
            errors+=("Input '$bool_name' must be true or false. Got: '$bool_value'")
          fi
        done

        if [[ -z "$lto" ]]; then
          errors+=("Input 'lto' cannot be empty")
        elif [[ "$lto" != "none" && "$lto" != "thin" && "$lto" != "full" ]]; then
          errors+=("Input 'lto' must be thin, full, or none. Got: '$lto'")
        fi

        if [[ -z "$uname" ]]; then
          errors+=("Input 'uname' cannot be empty")
        elif [[ ${#uname} -gt 44 ]]; then
          errors+=("Input 'uname' too long. Maximum length: 44. Got: '$uname'")
        fi

        case "$optimize" in
          O2|O3) ;;
          *) errors+=("optimize_level must be O2 or O3. Got: '$optimize'") ;;
        esac

        if [[ -n "$build_timestamp" ]]; then
          if ! date -u -d "$build_timestamp" >/dev/null 2>&1; then
            errors+=("build_timestamp is not parseable by GNU date. Got: '$build_timestamp'")
          fi
        fi

        if [ ${#errors[@]} -ne 0 ]; then
          echo "Found ${#errors[@]} validation error(s):" >&2
          for error in "${errors[@]}"; do
            echo "  - $error" >&2
          done
          echo "::error::Input validation failed. See logs for details."
          exit 1
        fi

        echo "✅ Input validation passed"
        echo "::endgroup::"
    
    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail

        CONFIG="$OP_MODEL"
        mkdir -p "$CONFIG"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

        CCACHE_DIR="$GITHUB_WORKSPACE/.ccache/${OP_MODEL}/${OP_OS_VERSION}"
        LDCACHE_DIR="$GITHUB_WORKSPACE/.ldcache/${OP_MODEL}/${OP_OS_VERSION}"
        CCACHE_LOGFILE="$GITHUB_WORKSPACE/ccache.log"
        mkdir -p "$CCACHE_DIR" "$LDCACHE_DIR"
        
        NPROC="$(nproc --all)"

        {
          echo "NPROC=$NPROC"
          echo "CCACHE_DIR=$CCACHE_DIR"
          echo "LDCACHE_DIR=$LDCACHE_DIR"

          if [ "${{ inputs.debug }}" = "true" ]; then
            echo "CCACHE_LOGFILE=$CCACHE_LOGFILE"
          fi

          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE"
          echo "CCACHE_MAXSIZE=8G"
          echo "CCACHE_COMPILERCHECK=content"
          echo "CCACHE_COMPRESS=true"
          echo "CCACHE_COMPRESSLEVEL=3"
          echo "CCACHE_DIRECT=true"
          echo "CCACHE_FILECLONE=true"
          echo "CCACHE_INODECACHE=true"
          echo "CCACHE_NOHASHDIR=true"
          echo "CCACHE_IGNOREOPTIONS=--sysroot*"
          echo "CCACHE_SLOPPINESS=file_macro,time_macros,include_file_mtime,include_file_ctime"
          echo "CCACHE_NOREADONLY_DIRECT=true"
        } >> "$GITHUB_ENV"

    - name: Optimize Global Git for Repo Tool
      shell: bash
      run: |
        set -euo pipefail
        git config --global feature.manyFiles true
        git config --global core.fsmonitor true
        git config --global pack.sparse true

    - name: Sync Kernel Source
      id: sync-kernel-source
      uses: ./action-source/.github/actions/kernel-source-sync
      with:
        source_location: ${{ env.CONFIG }}
        github_token: ${{ inputs.github_token }}
        debug: ${{ inputs.debug }}

    - name: Set Dir Paths
      shell: bash
      run: |
        set -euo pipefail

        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        KERNEL_PLATFORM_DIR="$CONFIG_DIR/kernel_platform"
        COMMON_KERNEL_DIR="$KERNEL_PLATFORM_DIR/common"
        MSM_KERNEL_DIR="$KERNEL_PLATFORM_DIR/msm-kernel"
        AK3_DIR="$CONFIG_DIR/AnyKernel3"
        DEBUG_ARTIFACTS_DIR="$GITHUB_WORKSPACE/debug_artifacts"
        KERNEL_PATCHES_DIR="$GITHUB_WORKSPACE/kernel_patches"
        SUSFS_DIR="$GITHUB_WORKSPACE/susfs4ksu"
        KSU_DIR="$KERNEL_PLATFORM_DIR/KernelSU"
        KSUN_DIR="$KERNEL_PLATFORM_DIR/KernelSU-Next"

        mkdir -p "$ARTIFACTS_DIR" "$DEBUG_ARTIFACTS_DIR"

        {
          echo "CONFIG_FOLDER=$CONFIG_DIR"
          echo "ARTIFACTS_FOLDER=$ARTIFACTS_DIR"
          echo "KERNEL_PLATFORM_FOLDER=$KERNEL_PLATFORM_DIR"
          echo "COMMON_KERNEL_FOLDER=$COMMON_KERNEL_DIR"
          echo "MSM_KERNEL_FOLDER=$MSM_KERNEL_DIR"
          echo "AK3_FOLDER=$AK3_DIR"
          echo "DEBUG_ARTIFACTS_FOLDER=$DEBUG_ARTIFACTS_DIR"
          echo "KERNEL_PATCHES_FOLDER=$KERNEL_PATCHES_DIR"
          echo "SUSFS_FOLDER=$SUSFS_DIR"
          echo "KSU_FOLDER=$KSU_DIR"
          echo "KSUN_FOLDER=$KSUN_DIR"
          echo "DEBUG_ZIP_NAME=debug_${OP_MODEL}_${OP_OS_VERSION}.zip"
        } >> "$GITHUB_ENV"

    - name: Set Kernel build-tools to Path
      shell: bash
      run: |
        set -euo pipefail
        echo "${KERNEL_PLATFORM_FOLDER}/prebuilts/kernel-build-tools/linux-x86/bin/"       >> "$GITHUB_PATH"
        echo "${KERNEL_PLATFORM_FOLDER}/prebuilts/kernel-build-tools/linux_musl-x86/bin/"  >> "$GITHUB_PATH"

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Get kernel version"

        cd "$COMMON_KERNEL_FOLDER"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""

        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l="$(grep '^[[:space:]]*BRANCH=' "$f" || true)"
            if [ -n "$l" ]; then
              BRANCH_LINE="$l"
              break
            fi
          fi
        done

        if [ -z "$BRANCH_LINE" ]; then
          echo "::error::No BRANCH= found in config files"
          exit 1
        fi

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        BRANCH_VALUE="${BRANCH_VALUE%\"}"
        BRANCH_VALUE="${BRANCH_VALUE#\"}"

        ANDROID_VERSION="$(echo "$BRANCH_VALUE" | grep -oE '^android[0-9]+' || true)"

        if [ -z "$ANDROID_VERSION" ]; then
          echo "::error::Failed to parse Android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi

        VERSION="$(grep '^VERSION *=' Makefile | awk '{print $3}')"
        PATCHLEVEL="$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')"
        SUBLEVEL="$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')"

        if [ -z "$VERSION" ] || [ -z "$PATCHLEVEL" ] || [ -z "$SUBLEVEL" ]; then
          echo "::error::Failed to parse kernel VERSION/PATCHLEVEL/SUBLEVEL from Makefile"
          exit 1
        fi

        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        cd "$ARTIFACTS_FOLDER"
        {
          echo "$ANDROID_VERSION-$FULL_VERSION"
          echo "$OP_OS_VERSION"
        } > "${OP_MODEL}_${OP_OS_VERSION}.txt"

        {
          echo "ANDROID_VER=$ANDROID_VERSION"
          echo "KERNEL_VER=$VERSION.$PATCHLEVEL"
          echo "TKERNEL_VER=$FULL_VERSION"
          echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION"

          if [ "${OP_SUSFS:-false}" = "true" ]; then
            echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL"
          fi
        } >> "$GITHUB_ENV"

        echo "Detected BRANCH: $BRANCH_VALUE"
        echo "Detected Android version: $ANDROID_VERSION"
        echo "Detected kernel version: $FULL_VERSION"
        echo "✅ Detected: $ANDROID_VERSION-$FULL_VERSION"
        echo "::endgroup::"

    - name: 🏷️ Set Build Identity
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Set build user/host"

        BUILD_USER="OnePlus"
        BUILD_HOST="ubuntu-build"

        {
          echo "BUILD_USER=$BUILD_USER"
          echo "BUILD_HOST=$BUILD_HOST"
        } >> "$GITHUB_ENV"

        echo "✅ Build identity configured:"
        echo "   User: $BUILD_USER"
        echo "   Host: $BUILD_HOST"
        echo "::endgroup::"

    - name: Check or Detect Clang
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Detect Clang"

        CLANG_FOUND=false
        CLANG_BIN=""

        if [ -n "${OP_ZYC_COMPILER:-}" ]; then
          echo "OP_ZYC_COMPILER detected: $OP_ZYC_COMPILER"

          ZYC_DIR="$CONFIG_FOLDER/compiler/zyc"
          TEMP_TAR="$CONFIG_FOLDER/compiler.tar.gz"
          mkdir -p "$ZYC_DIR"

          if curl -L --fail --retry 5 --retry-delay 5 --connect-timeout 60 -o "$TEMP_TAR" "$OP_ZYC_COMPILER"; then
            tar -xzf "$TEMP_TAR" -C "$ZYC_DIR" 2>/dev/null || true
            rm -f "$TEMP_TAR"

            if [ -x "$ZYC_DIR/bin/clang" ]; then
              CLANG_BIN="$ZYC_DIR/bin"
              CLANG_FOUND=true
            fi
          fi

        elif [ -n "${OP_C_COMPILER:-}" ]; then
          if [ -x "$CONFIG_FOLDER/$OP_C_COMPILER/clang" ]; then
            CLANG_BIN="$CONFIG_FOLDER/$OP_C_COMPILER"
            CLANG_FOUND=true
          fi
        fi

        if [ "$CLANG_FOUND" = false ]; then
          for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest="$(ls -d "$base/clang/host/linux-x86/clang-r"* 2>/dev/null | sort -V | tail -n1 || true)"

            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              CLANG_BIN="$latest/bin"
              CLANG_FOUND=true
              break
            fi
          done
        fi

        if [ "$CLANG_FOUND" = false ] && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
        fi

        [ "$CLANG_FOUND" = true ] || {
          echo "::error::No clang toolchain found"
          exit 1
        }

        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        short="$("$CLANG_BIN/clang" --version | sed -n '1s/.*clang-r\([0-9.]\+\).*/\1/p')"

        if [ -z "$short" ]; then
          short="$("$CLANG_BIN/clang" --version | sha256sum | cut -c1-8)"
        fi

        {
          echo "CLANG_BIN_PATH=$CLANG_BIN"
          echo "CLANG_VERSION=$CLANG_VERSION"
          echo "CLANG_VERSION_SHORT=$short"
          echo "LIBCLANG_PATH=$CLANG_BIN/../lib"
        } >> "$GITHUB_ENV"

        echo "$CLANG_BIN" >> "$GITHUB_PATH"

        echo "✅ Detected Clang: $CLANG_VERSION"
        echo "::endgroup::"

    - name: Check or Detect Rust & bindgen
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Detect Rust & bindgen"

        RUSTC_FOUND=false
        BINDGEN_FOUND=false

        if [ -z "${OP_RUST_COMPILER:-}" ]; then
          for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
            [ -d "$base/rust/linux-x86" ] || continue
            latest="$(ls -d "$base/rust/linux-x86/1."* 2>/dev/null | sort -V | tail -n1 || true)"

            if [ -n "$latest" ] && [ -x "$latest/bin/rustc" ]; then
              RUSTC_BIN="$latest/bin"
              RUSTC_FOUND=true
              break
            fi
          done
        else
          if [ -x "$CONFIG_FOLDER/$OP_RUST_COMPILER/rustc" ]; then
            RUSTC_BIN="$CONFIG_FOLDER/$OP_RUST_COMPILER"
            RUSTC_FOUND=true
          fi
        fi

        if [ -z "${OP_BINDGEN:-}" ]; then
          for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
            if [ -x "$base/clang-tools/linux-x86/bin/bindgen" ]; then
              BINDGEN_BIN="$base/clang-tools/linux-x86/bin"
              BINDGEN_FOUND=true
              chmod +x "$BINDGEN_BIN/bindgen"
              break
            fi
          done
        else
          if [ -x "$CONFIG_FOLDER/$OP_BINDGEN/bindgen" ]; then
            BINDGEN_BIN="$CONFIG_FOLDER/$OP_BINDGEN"
            BINDGEN_FOUND=true
            chmod +x "$BINDGEN_BIN/bindgen"
          fi
        fi

        [ "$RUSTC_FOUND" = true ] || {
          echo "::error::No Rust toolchain found"
          exit 1
        }

        {
          echo "RUSTC_BIN_PATH=$RUSTC_BIN"
          echo "RUSTC=$RUSTC_BIN/rustc"
        } >> "$GITHUB_ENV"

        echo "$RUSTC_BIN" >> "$GITHUB_PATH"

        if [ "$BINDGEN_FOUND" = true ]; then
          {
            echo "BINDGEN_BIN_PATH=$BINDGEN_BIN"
            echo "BINDGEN=$BINDGEN_BIN/bindgen"
          } >> "$GITHUB_ENV"

          echo "$BINDGEN_BIN" >> "$GITHUB_PATH"
        fi

        echo "✅ Rust/bindgen detection complete"
        echo "::endgroup::"

    - name: Install bindgen only (no rustc)
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' && !env.BINDGEN_BIN_PATH }}
      run: |
        set -euo pipefail
        echo "::group::Install bindgen only (no rustc)"

        RUSTUP_SCRIPT="$(mktemp /tmp/rustup_XXXXXX.sh)"
        trap 'rm -f "$RUSTUP_SCRIPT"' EXIT

        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs -o "$RUSTUP_SCRIPT"

        SCRIPT_SIZE="$(stat -c%s "$RUSTUP_SCRIPT")"
        if [ "$SCRIPT_SIZE" -lt 512 ]; then
          echo "::error::rustup installer suspiciously small (${SCRIPT_SIZE} bytes)"
          exit 1
        fi

        bash "$RUSTUP_SCRIPT" -y --default-toolchain none
        # shellcheck source=/dev/null
        source "$HOME/.cargo/env"

        cargo install bindgen-cli --version 0.69.5

        BINDGEN="$(which bindgen)"
        BINDGEN_BIN="$(dirname "$BINDGEN")"
        echo "$BINDGEN_BIN"  >> "$GITHUB_PATH"
        echo "BINDGEN=$BINDGEN" >> "$GITHUB_ENV"

        bindgen --version
        echo "::endgroup::"

    - name: Test Rust & bindgen
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Test Rust & bindgen"
        cd "$COMMON_KERNEL_FOLDER"
        export RUSTTARGET="aarch64-linux-android"
        make V=1 rustavailable
        echo "::endgroup::"

    - name: Restore ccache cache
      id: restore-ccache-cache
      uses: ./action-source/.github/actions/cache/restore
      if: ${{ inputs.clean == false || inputs.clean == 'false' }}
      with:
        cache_path: ${{ env.CCACHE_DIR }}
        cache_key: ${{ inputs.ksu_type }}-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
        cache_bucket: "ccache-cache"
        debug: ${{ inputs.debug }}
        restore_keys: |
          ${{ inputs.ksu_type }}-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-
          ${{ inputs.ksu_type }}-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-

    - name: Restore LTO LD cache
      id: restore-lto-ld-cache
      uses: ./action-source/.github/actions/cache/restore
      if: ${{ (inputs.clean == false || inputs.clean == 'false') && env.OP_LTO != 'none' }}
      with:
        cache_path: ${{ env.LDCACHE_DIR }}
        cache_key: ${{ inputs.ksu_type }}-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
        cache_bucket: "lto-cache"
        debug: ${{ inputs.debug }}
        restore_keys: |
          ${{ inputs.ksu_type }}-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-
          ${{ inputs.ksu_type }}-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-

    - name: Check ccache
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Check ccache"

        echo "/usr/lib/ccache" >> "$GITHUB_PATH"

        sanitize_ccache_env() {
          unset CCACHE_DEPEND          || true
          unset CCACHE_READONLY_DIRECT || true
          unset CCACHE_COMPRESSION     || true
          unset CCACHE_COMPRESSION_LEVEL || true
          unset CCACHE_FILE_CLONE      || true
          unset CCACHE_INODE_CACHE     || true

          export CCACHE_COMPILERCHECK=content
          export CCACHE_COMPRESS=true
          export CCACHE_COMPRESSLEVEL=3
          export CCACHE_DIRECT=true
          export CCACHE_FILECLONE=true
          export CCACHE_INODECACHE=true
          export CCACHE_NOREADONLY_DIRECT=true
          export CCACHE_NOHASHDIR=true
          export CCACHE_IGNOREOPTIONS="--sysroot*"
        }

        sanitize_ccache_env

        if env | grep -q '^CCACHE_DEPEND='; then
          echo "::error::CCACHE_DEPEND is still set"
          exit 1
        fi

        if env | grep -q '^CCACHE_READONLY_DIRECT='; then
          echo "::error::CCACHE_READONLY_DIRECT is still set"
          exit 1
        fi

        echo "ccache config:"
        sanitize_ccache_env
        ccache -p || true

        if [ -d "$CCACHE_DIR" ] && find "$CCACHE_DIR" -type f -print -quit 2>/dev/null | grep -q .; then
          echo "✅ Restored cache found"
          sanitize_ccache_env
          ccache -s | head -n 30 || true
          find "$CCACHE_DIR" -type f -exec touch -t "$(date -d "1 day ago" +%Y%m%d%H%M)" {} + || true
        else
          echo "⚠️ No existing cache"
        fi

        sanitize_ccache_env
        ccache -z || true

        echo "::endgroup::"    

    - name: Fetch SusFS and Other Dependencies
      shell: bash
      run: |
        echo "::group::Fetch dependencies"
        set -euo pipefail

        cd "$GITHUB_WORKSPACE"
        echo "Fetching SusFS and other dependencies..."

        ensure_tool() {
          local tool="$1" package="$2"
          command -v "$tool" >/dev/null 2>&1 && return 0
          echo "$tool not found, installing $package..."
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y "$package"
          else
            apt-get update -q && apt-get install -y "$package"
          fi
          command -v "$tool" >/dev/null 2>&1 || {
            echo "::error::Failed to install $tool"
            exit 1
          }
        }

        ensure_tool aria2c aria2
        ensure_tool pigz   pigz

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          SUSFS_INPUT="${{ inputs.susfs_commit_hash_or_branch }}"

          declare -A DEFAULT_SUSFS=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )

          KERNEL_KEY="${ANDROID_VER}-${KERNEL_VER}"

          if [ -z "$SUSFS_INPUT" ]; then
            SUSFS_BRANCH="${DEFAULT_SUSFS[$KERNEL_KEY]:-gki-android15-6.6}"
            echo "Using default SUSFS branch for $KERNEL_KEY: $SUSFS_BRANCH"
          else
            SUSFS_BRANCH="$SUSFS_INPUT"
            echo "Using resolved SUSFS ref: $SUSFS_BRANCH"
          fi
        fi
       
        # Usage: retry_clone <url> [branch] [depth] [target_dir]
        retry_clone() {
          local url="$1"
          local branch="${2:-main}"
          local depth="${3:-1}"
          local dir="${4:-$(basename "$url" .git)}"

          local max_attempts=3
          local attempt=1
          local clone_args=(--branch "$branch")

          if [ "$depth" != "0" ] && [ -n "$depth" ]; then
            clone_args+=(--depth "$depth")
          fi

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Attempt $attempt/$max_attempts: cloning $url ($branch) into $dir"
            rm -rf "$dir"

            if git clone "${clone_args[@]}" "$url" "$dir"; then
              echo "✅ Cloned: $url → $dir"
              return 0
            fi

            rm -rf "$dir" 2>/dev/null || true
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          echo "::error::All clone attempts failed for $url"
          return 1
        }

        clone_susfs_ref() {
          local ref="$1"
          local dir="$2"
          local url="https://gitlab.com/simonpunk/susfs4ksu.git"

          rm -rf "$dir"

          local max_attempts=4
          local attempt=1
          local is_sha=false

          [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]] && is_sha=true

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "SUSFS clone attempt $attempt/$max_attempts"
            rm -rf "$dir"

            if [ "$is_sha" = false ]; then
              if git clone --filter=blob:none --single-branch --branch "$ref" "$url" "$dir"; then
                echo "✅ SUSFS cloned as branch/tag: $ref"
                return 0
              fi
              rm -rf "$dir"
            fi

            if git clone --filter=blob:none "$url" "$dir"; then
              cd "$dir"
              git fetch --filter=blob:none origin "$ref" || true
              git fetch --filter=blob:none origin "+refs/heads/*:refs/remotes/origin/*" || true
              git fetch --filter=blob:none origin "+refs/tags/*:refs/tags/*" || true

              if git checkout "$ref" 2>/dev/null || git checkout "origin/$ref" 2>/dev/null; then
                cd "$GITHUB_WORKSPACE"
                echo "✅ SUSFS checked out ref: $ref"
                return 0
              fi
              cd "$GITHUB_WORKSPACE"
            fi

            rm -rf "$dir" 2>/dev/null || true
            sleep $((attempt * 8))
            attempt=$((attempt + 1))
          done

          echo "::error::Failed to clone SUSFS ref after ${max_attempts} attempts: $ref"
          return 1
        }
        
        echo "Starting parallel dependency cloning..."

        declare -A CLONE_PIDS
        declare -A CLONE_LOGS

        CLONE_LOGS[kernel_patches]="$(mktemp /tmp/clone_log_XXXXXX)"
        (
          retry_clone "https://github.com/WildKernels/kernel_patches.git" "main" "1" \
            > "${CLONE_LOGS[kernel_patches]}" 2>&1
        ) &
        CLONE_PIDS[kernel_patches]=$!

        if [ "${{ inputs.enable_adios }}" = "true" ]; then
          CLONE_LOGS[adios]="$(mktemp /tmp/clone_log_XXXXXX)"
          (
            retry_clone \
              "https://github.com/Bouteillepleine/kernel_patches.git" \
              "main" "1" \
              "bouton_kernel_patches" \
              > "${CLONE_LOGS[adios]}" 2>&1
          ) &
          CLONE_PIDS[adios]=$!
        fi       

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          CLONE_LOGS[susfs]="$(mktemp /tmp/clone_log_XXXXXX)"
          (
            clone_susfs_ref "$SUSFS_BRANCH" "$SUSFS_FOLDER" \
              > "${CLONE_LOGS[susfs]}" 2>&1
          ) &
          CLONE_PIDS[susfs]=$!
        fi

        CLONE_FAILED=false

        for name in "${!CLONE_PIDS[@]}"; do
          pid="${CLONE_PIDS[$name]}"
          log="${CLONE_LOGS[$name]}"

          echo "Waiting for clone: $name (PID $pid)..."

          if wait "$pid"; then
            echo "✅ Clone succeeded: $name"
          else
            echo "::error::Clone failed: $name"
            echo "--- Log for $name ---"
            cat "$log" || true
            echo "---------------------"
            CLONE_FAILED=true
          fi

          cat "$log" || true
          rm -f "$log"
        done

        if [ "$CLONE_FAILED" = "true" ]; then
          echo "::error::One or more dependency clones failed"
          exit 1
        fi

        if [ "${{ inputs.enable_adios }}" = "true" ]; then
          echo "ADIOS_PATCHES_FOLDER=$GITHUB_WORKSPACE/bouton_kernel_patches/experimental" >> "$GITHUB_ENV"
        fi

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          SUSFS_COMMIT_SHA="$(git -C "$SUSFS_FOLDER" rev-parse HEAD 2>/dev/null || echo unknown)"
          {
            echo "SUSFS_REF=$SUSFS_BRANCH"
            echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA"
          } >> "$GITHUB_ENV"

          echo "✅ SUSFS cloned — ref: $SUSFS_BRANCH  commit: $SUSFS_COMMIT_SHA"
        fi

        echo "All dependencies fetched"
        echo "::endgroup::"

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        echo "::group::Clean Up ABI Protected Exports"
        set -euo pipefail
        cd "$KERNEL_PLATFORM_FOLDER"
        rm -f common/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true
        echo "::endgroup::"
    
    - name: Add ReSukiSU
      shell: bash
      if: ${{ inputs.ksu_type == 'RSKSU' }}
      run: |
        set -euo pipefail
        echo "::group::Add ReSukiSU"

        cd "$KERNEL_PLATFORM_FOLDER"

        RSKSU_SETUP_SCRIPT="$(mktemp /tmp/rsksu_setup_XXXXXX.sh)"
        trap 'rm -f "$RSKSU_SETUP_SCRIPT"' EXIT

        echo "Downloading ReSukiSU setup script..."
        if ! curl --fail --location --proto '=https' --tlsv1.2 -LSs \
          "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" \
          -o "$RSKSU_SETUP_SCRIPT"; then
          echo "::error::Failed to download ReSukiSU setup.sh"
          exit 1
        fi

        SCRIPT_SIZE="$(stat -c%s "$RSKSU_SETUP_SCRIPT")"
        if [ "$SCRIPT_SIZE" -lt 512 ]; then
          echo "::error::Downloaded setup.sh is suspiciously small (${SCRIPT_SIZE} bytes). Aborting."
          exit 1
        fi

        if ! head -n1 "$RSKSU_SETUP_SCRIPT" | grep -q '^#!'; then
          echo "::error::Downloaded setup.sh does not start with a shebang. Aborting."
          exit 1
        fi

        chmod +x "$RSKSU_SETUP_SCRIPT"

        KSU_INPUT="${{ inputs.ksu_branch_or_hash }}"
        if [ -z "$KSU_INPUT" ]; then
          echo "No branch/hash provided — using default installer mode."
          bash "$RSKSU_SETUP_SCRIPT"
        else
          echo "Using ReSukiSU branch/hash: $KSU_INPUT"
          bash "$RSKSU_SETUP_SCRIPT" "$KSU_INPUT"
        fi

        if [ ! -d "$KERNEL_PLATFORM_FOLDER/KernelSU" ]; then
          echo "::error::KernelSU directory was not created by ReSukiSU setup."
          find "$KERNEL_PLATFORM_FOLDER" -maxdepth 3 -type d \( -iname "*ksu*" -o -iname "*resuki*" \) || true
          exit 1
        fi

        cd "$KERNEL_PLATFORM_FOLDER/KernelSU"

        KSU_COMMIT_SHA="$(git rev-parse HEAD 2>/dev/null || echo unknown)"
        COMMITS_COUNT="$(git rev-list --count HEAD 2>/dev/null || true)"
        if [[ ! "$COMMITS_COUNT" =~ ^[0-9]+$ ]]; then
          echo "::warning::Could not determine commit count, using fallback 30000."
          COMMITS_COUNT=30000
        fi

        BASE_VERSION=30700
        KSU_VERSION=$((COMMITS_COUNT + BASE_VERSION))

        echo "ReSukiSU commits: $COMMITS_COUNT"
        echo "ReSukiSU version: $KSU_VERSION"
        echo "ReSukiSU commit:  $KSU_COMMIT_SHA"

        {
          echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA"
          echo "KSUVER=$KSU_VERSION"
        } >> "$GITHUB_ENV"

        cd ..

        DEFCONFIG="$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
        mkdir -p "$(dirname "$DEFCONFIG")"
        touch "$DEFCONFIG"
        
        TAG_NAME="$(git -C KernelSU describe --tags --abbrev=0 2>/dev/null || echo v1.0.0)"

        sed -i \
          -e '/^CONFIG_KSU=/d' \
          -e '/^CONFIG_KSU_MULTI_MANAGER_SUPPORT=/d' \
          -e '/^CONFIG_KSU_FULL_NAME_FORMAT=/d' \
          "$DEFCONFIG" || true

        {
          printf '%s\n' 'CONFIG_KSU=y'
          printf '%s\n' 'CONFIG_KSU_MULTI_MANAGER_SUPPORT=y'
          printf 'CONFIG_KSU_FULL_NAME_FORMAT="%s-⚡Ultra⚡@ReSukiSU"\n' "${TAG_NAME}"
        } >> "$DEFCONFIG"

        {
          echo "RSKSU"
          echo "$KSU_VERSION"
        } >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"

        echo "✅ ReSukiSU added (commit: ${KSU_COMMIT_SHA:0:8})"
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      shell: bash
      if: ${{ env.OP_SUSFS == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply SUSFS patches"

        cd "$KERNEL_PLATFORM_FOLDER"

        if [ ! -d "$SUSFS_FOLDER/kernel_patches" ]; then
          echo "::error::SUSFS folder missing: $SUSFS_FOLDER/kernel_patches"
          exit 1
        fi

        if [ -d "$SUSFS_FOLDER/kernel_patches/fs" ]; then
          find "$SUSFS_FOLDER/kernel_patches/fs" -maxdepth 1 -type f -exec cp -f {} "$COMMON_KERNEL_FOLDER/fs/" \;
        fi

        if [ -d "$SUSFS_FOLDER/kernel_patches/include/linux" ]; then
          find "$SUSFS_FOLDER/kernel_patches/include/linux" -maxdepth 1 -type f -exec cp -f {} "$COMMON_KERNEL_FOLDER/include/linux/" \;
        fi

        SUSVER="unknown"

        for f in \
          "$COMMON_KERNEL_FOLDER/include/linux/susfs.h" \
          "$COMMON_KERNEL_FOLDER/include/linux/susfs_def.h" \
          "$SUSFS_FOLDER/kernel_patches/include/linux/susfs.h" \
          "$SUSFS_FOLDER/kernel_patches/include/linux/susfs_def.h"; do

          if [ -f "$f" ]; then
            found="$(
              grep -E 'SUSFS_VERSION|SUSFS_VERSION_STR|SUSFS_VER' "$f" 2>/dev/null \
                | grep -Eo '"[^"]+"' \
                | head -n1 \
                | tr -d '"' \
                || true
            )"

            if [ -n "$found" ]; then
              SUSVER="$found"
              break
            fi
          fi
        done

        echo "SUSVER=$SUSVER" >> "$GITHUB_ENV"
        echo "$SUSVER" >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"
        echo "SUSFS Version: $SUSVER"

        version_lte() {
          [ "$(printf '%s\n' "$2" "$1" | sort -V | head -n1)" = "$1" ]
        }

        if [ "${{ inputs.ksu_type }}" = "RSKSU" ]; then
          echo "NEED_HOOKS=false" >> "$GITHUB_ENV"
        elif [ "$SUSVER" != "unknown" ] && version_lte "${SUSVER#v}" "1.5.12"; then
          echo "NEED_HOOKS=true" >> "$GITHUB_ENV"
        else
          echo "NEED_HOOKS=false" >> "$GITHUB_ENV"
        fi

        case "$SUSVER" in
          v1.5.8|v1.5.9|v1.5.10|v1.5.11|v1.5.12|v2.0.0|v2.1.0|v2.2.0)
            echo "✅ Supported SUSFS version: $SUSVER"
            echo "ℹ️ Skipping KernelSU folder patch for ReSukiSU"
            ;;
          unknown)
            echo "Warning: Could not detect SUSFS version. Continuing because patch file exists."
            ;;
          *)
            echo "::error::Unsupported SUSFS version: $SUSVER"
            exit 1
            ;;
        esac

        cd "$COMMON_KERNEL_FOLDER"

        KMI="${ANDROID_VER}-${KERNEL_VER}"
        SUBLEVEL="$(grep '^SUBLEVEL *=' Makefile | head -n1 | cut -d= -f2 | tr -d ' ')"

        echo "Detected KMI: $KMI"
        echo "Detected SUBLEVEL: $SUBLEVEL"

        SUSFS_PATCH_APPLIED=false

        repair_namespace_hunk1() {
          local ns_file="./fs/namespace.c"

          if [ ! -f "$ns_file" ]; then
            echo "::error::Cannot repair namespace hunk: $ns_file not found"
            return 1
          fi

          echo "Attempting manual repair for SUSFS fs/namespace.c hunk #1"

          if ! grep -qF '#include <linux/susfs_def.h>' "$ns_file"; then
            if grep -qF '#include <linux/mnt_idmapping.h>' "$ns_file"; then
              sed -i '/#include <linux\/mnt_idmapping\.h>/a\
        #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
        #include <linux/susfs_def.h>\
        #endif // #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT' "$ns_file"
            elif grep -qF '#include <linux/shmem_fs.h>' "$ns_file"; then
              sed -i '/#include <linux\/shmem_fs\.h>/a\
        #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
        #include <linux/susfs_def.h>\
        #endif // #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT' "$ns_file"
            else
              sed -i '1i\
        #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
        #include <linux/susfs_def.h>\
        #endif // #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT' "$ns_file"
            fi
          fi

          if ! grep -qF '#include <trace/hooks/fs.h>' "$ns_file"; then
            if grep -qF '#include <trace/hooks/blk.h>' "$ns_file"; then
              sed -i '/#include <trace\/hooks\/blk\.h>/a #include <trace/hooks/fs.h>' "$ns_file"
            elif grep -qF '#include "internal.h"' "$ns_file"; then
              sed -i '/#include "internal.h"/a #include <trace/hooks/fs.h>' "$ns_file"
            else
              sed -i '1i#include <trace/hooks/fs.h>' "$ns_file"
            fi
          fi

          if ! grep -qF 'susfs_is_sdcard_android_data_not_decrypted' "$ns_file"; then
            if grep -qF '/* Maximum number of mounts in a mount namespace */' "$ns_file"; then
              sed -i '/\/\* Maximum number of mounts in a mount namespace \*\//i\
        #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
        extern bool susfs_is_current_ksu_domain(void);\
        extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\
        \
        #define CL_COPY_MNT_NS BIT(25) /* used by copy_mnt_ns() */\
        \
        #endif // #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
        ' "$ns_file"
            else
              echo "::error::Cannot find mount_max anchor in fs/namespace.c"
              return 1
            fi
          fi

          echo "Manual namespace hunk repair completed"

          grep -nF '#include <linux/susfs_def.h>' "$ns_file" || return 1
          grep -nF '#include <trace/hooks/fs.h>' "$ns_file" || return 1
          grep -nF 'susfs_is_current_ksu_domain' "$ns_file" || return 1
          grep -nF 'susfs_is_sdcard_android_data_not_decrypted' "$ns_file" || return 1
          grep -nF 'CL_COPY_MNT_NS' "$ns_file" || return 1

          return 0
        }

        fake_patched=0
        fake_patched_dist=0
        fake_patched_swap=0
        fake_patched_expand=0

        if [ "$KMI" = "android15-6.6" ]; then
          if [ -f "./fs/proc/task_mmu.c" ] && ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
            echo "nr_subpages not found, applying patch compatibility fix"

            sed -i \
              -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' \
              -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' \
              ./fs/proc/task_mmu.c

            fake_patched=1
          fi

          if [ -f "./fs/proc/base.c" ] && ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            echo "#include <linux/dma-buf.h> not found, adding missing header file"
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
          fi

          if [ -f "./mm/memory.c" ] && ! grep -qxF '#include <linux/zswap.h>' ./mm/memory.c; then
            echo "#include <linux/zswap.h> not found, adding missing header file"
            sed -i '/#include <linux\/sched\/sysctl\.h>/a #include <linux\/zswap.h>' ./mm/memory.c
            fake_patched_swap=1
          fi

          if [ -f "./fs/proc/task_mmu.c" ] \
            && grep -qF 'if (vma->vm_end > last_vma_end)' ./fs/proc/task_mmu.c \
            && ! grep -qF 'if (vma->vm_end > last_vma_end) {' ./fs/proc/task_mmu.c; then

            echo "Temporarily expanding the last_vma_end if block to fix matching issues"

            perl -i -0pe \
              's/\t\t\tif \(vma->vm_end > last_vma_end\)\n\t\t\t\tsmap_gather_stats\(vma, \&mss, last_vma_end\);/\t\t\tif (vma->vm_end > last_vma_end) {\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t}/' \
              ./fs/proc/task_mmu.c

            fake_patched_expand=1
          fi
        fi

        if [ "$KMI" = "android14-6.1" ]; then
          if [ -f "./fs/proc/task_mmu.c" ] && ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages not found, applying patch compatibility fix"
            fake_patched=1
          fi

          if [ -f "./fs/proc/base.c" ] && ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
            echo "#include <linux/dma-buf.h> not found, adding missing header file"
            sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
          fi
        fi

        if [ "$KMI" = "android12-5.10" ] || [ "$KMI" = "android13-5.15" ]; then
          if [ -f "./fs/proc/task_mmu.c" ] && ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages not found, applying patch compatibility fix"
            fake_patched=1
          fi
        fi

        if [ "$KMI" = "android13-5.15" ]; then
          if [ -f "./mm/memory.c" ] \
            && grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c \
            && ! grep -qxF '#include <linux/susfs_def.h>' ./mm/memory.c; then

            echo "Found swap_slots.h interfering with detection, temporarily removing it"
            sed -i '/#include <linux\/swap_slots\.h>/d' ./mm/memory.c
            fake_patched_dist=1
          fi
        fi

        echo "Applying SUSFS patch"

        SUSFS_PATCH_FILE=""

        if [ -n "${SUSFS_KERNEL_BRANCH:-}" ] && [ -f "$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_${SUSFS_KERNEL_BRANCH}.patch" ]; then
          SUSFS_PATCH_FILE="$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_${SUSFS_KERNEL_BRANCH}.patch"
        elif [ -f "$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch" ]; then
          SUSFS_PATCH_FILE="$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch"
        fi

        if [ -z "$SUSFS_PATCH_FILE" ] || [ ! -f "$SUSFS_PATCH_FILE" ]; then
          echo "::error::SUSFS patch not found for ${ANDROID_VER}-${KERNEL_VER}"
          find "$SUSFS_FOLDER/kernel_patches" -maxdepth 2 -name '*.patch' -print || true
          exit 1
        fi

        echo "Using SUSFS patch: $SUSFS_PATCH_FILE"

        if ! grep -q '^@@ ' "$SUSFS_PATCH_FILE"; then
          echo "::error::SUSFS patch contains no unified diff hunks: $SUSFS_PATCH_FILE"
          exit 1
        fi

        PATCH_LOG="/tmp/susfs_patch_${OP_MODEL}_${KERNEL_FULL_VER}.log"

        if patch -p1 --forward --verbose < "$SUSFS_PATCH_FILE" > "$PATCH_LOG" 2>&1; then
          echo "SUSFS patch applied cleanly"
          echo "SUSFS_PATCH_STATUS=clean" >> "$GITHUB_ENV"
          SUSFS_PATCH_APPLIED=true
        else
          PATCH_EXIT_CODE=$?

          echo "SUSFS patch did not apply fully. Checking for recoverable rejects."

          REJECT_FILES="$(find "$COMMON_KERNEL_FOLDER" -name '*.rej' -print || true)"
          REJECT_COUNT="$(find "$COMMON_KERNEL_FOLDER" -name '*.rej' -print 2>/dev/null | wc -l | tr -d ' ')"

          NAMESPACE_REJECT_BY_FILE=false
          NAMESPACE_REJECT_BY_LOG=false
          MEMORY_REJECT_BY_FILE=false
          MEMORY_REJECT_HAS_SUS_MAP=false
          OTHER_REJECT_BY_LOG=false

          [ -f "./fs/namespace.c.rej" ] && NAMESPACE_REJECT_BY_FILE=true
          [ -f "./mm/memory.c.rej" ] && MEMORY_REJECT_BY_FILE=true

          if grep -qF 'patching file fs/namespace.c' "$PATCH_LOG" \
            && grep -qE 'Hunk #[0-9]+ FAILED at|saving rejects to file fs/namespace\.c\.rej' "$PATCH_LOG"; then
            NAMESPACE_REJECT_BY_LOG=true
          fi

          if [ -f "./mm/memory.c.rej" ] && grep -q 'CONFIG_KSU_SUSFS_SUS_MAP' "./mm/memory.c.rej"; then
            MEMORY_REJECT_HAS_SUS_MAP=true
          fi

          OTHER_REJECT_LINES="$(
            grep -E 'saving rejects to file ' "$PATCH_LOG" 2>/dev/null \
              | grep -vF 'saving rejects to file fs/namespace.c.rej' \
              | grep -vF 'saving rejects to file mm/memory.c.rej' \
              || true
          )"

          [ -n "$OTHER_REJECT_LINES" ] && OTHER_REJECT_BY_LOG=true

          echo "Reject count from filesystem: $REJECT_COUNT"
          echo "Namespace reject by file: $NAMESPACE_REJECT_BY_FILE"
          echo "Namespace reject by log: $NAMESPACE_REJECT_BY_LOG"
          echo "Memory reject by file: $MEMORY_REJECT_BY_FILE"
          echo "Memory reject has SUS_MAP: $MEMORY_REJECT_HAS_SUS_MAP"
          echo "Other reject by log: $OTHER_REJECT_BY_LOG"

          if [ "$KMI" = "android15-6.6" ] \
            && { [ "$NAMESPACE_REJECT_BY_FILE" = "true" ] || [ "$NAMESPACE_REJECT_BY_LOG" = "true" ]; } \
            && [ "$OTHER_REJECT_BY_LOG" = "false" ]; then

            echo "Detected known fs/namespace.c reject on $KMI. Attempting manual namespace hunk repair."

            if repair_namespace_hunk1; then
              rm -f "./fs/namespace.c.rej" "./fs/namespace.c.orig"
              SUSFS_PATCH_APPLIED=true
              echo "SUSFS_PATCH_STATUS=recovered_namespace_repair" >> "$GITHUB_ENV"
              echo "✅ SUSFS patch recovered after manual namespace repair"
            else
              echo "SUSFS_PATCH_STATUS=failed_namespace_repair" >> "$GITHUB_ENV"
              echo "::error::SUSFS patch failed: manual namespace repair failed"

              echo "::group::SUSFS patch log"
              tail -n 180 "$PATCH_LOG" || true
              echo "::endgroup::"

              exit "$PATCH_EXIT_CODE"
            fi
          elif [ "$MEMORY_REJECT_BY_FILE" = "true" ] \
            && [ "$MEMORY_REJECT_HAS_SUS_MAP" = "true" ] \
            && [ "$OTHER_REJECT_BY_LOG" = "false" ]; then

            echo "Detected known mm/memory.c SUS_MAP reject. Applying manual fallback."

            sed -i '/#include <linux\/vmalloc.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP\n#include <linux\/susfs_def.h>\n#endif \/\/ #ifdef CONFIG_KSU_SUSFS_SUS_MAP' ./mm/memory.c

            rm -f "./mm/memory.c.rej" "./mm/memory.c.orig"
            SUSFS_PATCH_APPLIED=true
            echo "SUSFS_PATCH_STATUS=recovered_memory_sus_map" >> "$GITHUB_ENV"
            echo "✅ SUSFS patch recovered after mm/memory.c fallback"
          else
            echo "SUSFS_PATCH_STATUS=failed_unrecoverable" >> "$GITHUB_ENV"
            echo "::error::SUSFS patch failed and is not eligible for automatic repair"
            echo "Reject count: $REJECT_COUNT"

            if [ -n "$REJECT_FILES" ]; then
              echo "::group::Reject files"
              while IFS= read -r rej; do
                echo "----- Reject file: $rej -----"
                cat "$rej"
                echo ""
              done <<< "$REJECT_FILES"
              echo "::endgroup::"
            fi

            echo "::group::SUSFS patch log"
            tail -n 180 "$PATCH_LOG" || true
            echo "::endgroup::"

            grep -nE 'FAILED|saving rejects|\.rej|malformed|cannot find|Skipping patch' "$PATCH_LOG" || true
            exit "$PATCH_EXIT_CODE"
          fi
        fi

        [ "$SUSFS_PATCH_APPLIED" = "true" ] || {
          echo "::error::SUSFS patch was not successfully applied"
          exit 1
        }

        if [ "$fake_patched_expand" = 1 ]; then
          if [ "$KMI" = "android15-6.6" ]; then
            if [ -f "./fs/proc/task_mmu.c" ] && grep -qF 'if (vma->vm_end > last_vma_end) {' ./fs/proc/task_mmu.c; then
              perl -i -0pe \
                's/\t\t\tif \(vma->vm_end > last_vma_end\) \{\n\t\t\t\tsmap_gather_stats\(vma, \&mss, last_vma_end\);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t\}/\t\t\tif (vma->vm_end > last_vma_end)\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);/' \
                ./fs/proc/task_mmu.c
            fi
          fi
        fi

        if [ "$fake_patched" = 1 ]; then
          if [ "$KMI" = "android15-6.6" ]; then
            if [ -f "./fs/proc/task_mmu.c" ] && grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              sed -i \
                -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' \
                -e '/pagemap_entry_t \*res = NULL;/d' \
                ./fs/proc/task_mmu.c
            fi
          fi

          if [ "$KMI" = "android12-5.10" ] || [ "$KMI" = "android13-5.15" ] || [ "$KMI" = "android14-6.1" ]; then
            if [ -f "./fs/proc/task_mmu.c" ] && grep -q 'goto[[:space:]]\+show_pad;' ./fs/proc/task_mmu.c; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
        fi

        if [ "$fake_patched_dist" = 1 ]; then
          if [ "$KMI" = "android13-5.15" ]; then
            if [ -f "./mm/memory.c" ] && ! grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c; then
              sed -i '/#include <linux\/vmalloc.h>/a #include <linux\/swap_slots.h>' ./mm/memory.c
            fi
          fi
        fi

        if [ "$fake_patched_swap" = 1 ]; then
          if [ "$KMI" = "android15-6.6" ]; then
            if [ -f "./mm/memory.c" ] && grep -qxF '#include <linux/zswap.h>' ./mm/memory.c; then
              sed -i '/#include <linux\/zswap\.h>/d' ./mm/memory.c
            fi
          fi
        fi

        echo "Checking for reject files"

        REJECT_FILES="$(find "$COMMON_KERNEL_FOLDER" -name '*.rej' -print || true)"

        if [ -n "$REJECT_FILES" ]; then
          echo "::error::Reject files found after SUSFS patching:"
          while IFS= read -r rej; do
            echo "::group::Reject file: $rej"
            cat "$rej"
            echo "::endgroup::"
          done <<< "$REJECT_FILES"
          exit 1
        fi

        echo "✅ SUSFS patches applied"

        DEFCONFIG="$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
        mkdir -p "$(dirname "$DEFCONFIG")"
        touch "$DEFCONFIG"

        set_config() {
          local key="$1"
          local val="$2"
          local line="${key}=${val}"

          if grep -qE "^${key}=|^# ${key} is not set" "$DEFCONFIG"; then
            sed -i -E "s|^${key}=.*|${line}|; s|^# ${key} is not set|${line}|" "$DEFCONFIG"
          else
            printf '%s\n' "$line" >> "$DEFCONFIG"
          fi
        }

        set_config CONFIG_KSU_SUSFS y
        set_config CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT y
        set_config CONFIG_KSU_SUSFS_SUS_PATH y
        set_config CONFIG_KSU_SUSFS_SUS_MOUNT y
        set_config CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT y
        set_config CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT y
        set_config CONFIG_KSU_SUSFS_SUS_KSTAT y
        set_config CONFIG_KSU_SUSFS_SUS_OVERLAYFS n
        set_config CONFIG_KSU_SUSFS_TRY_UMOUNT y
        set_config CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT y
        set_config CONFIG_KSU_SUSFS_SPOOF_UNAME y
        set_config CONFIG_KSU_SUSFS_ENABLE_LOG y
        set_config CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS y
        set_config CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG y
        set_config CONFIG_KSU_SUSFS_OPEN_REDIRECT y
        set_config CONFIG_KSU_SUSFS_SUS_MAP y
        set_config CONFIG_KSU_SUSFS_SUS_SU n

        echo "SUSFS defconfig entries:"
        grep -nE '^CONFIG_KSU_SUSFS' "$DEFCONFIG" || true

        echo "SUSFS_PATCH_APPLIED=true" >> "$GITHUB_ENV"

        echo "::endgroup::"

    - name: Add BBG
      if: ${{ env.OP_BBG == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add BBG LSM"

        cd "$KERNEL_PLATFORM_FOLDER"

        echo "Adding BBG..."

        if ! wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash -s main; then
          echo "::warning::BBG setup script failed, continuing anyway"
        fi

        echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig

        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

        echo "✅ BBG LSM added"
        echo "::endgroup::"
        
    - name: Apply KSU Hooks
      shell: bash
      if: ${{ env.NEED_HOOKS == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply KSU hooks"
        cd "$COMMON_KERNEL_FOLDER"
        patch -p1 < "$KERNEL_PATCHES_FOLDER/next/scope_min_manual_hooks_v1.4.patch"
        echo "✅ KSU hooks applied"
        echo "::endgroup::"

    - name: Apply Other Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply Other patches"

        cd "$COMMON_KERNEL_FOLDER"

        KERNEL_VERSION="$KERNEL_VER"
        MIN_VERSION="5.16"

        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi

        if [ "$OP_HMBIRD" = "true" ]; then
          HMBIRD_MODEL="$(echo "$OP_MODEL" | sed 's/-[0-9]\+\.[0-9]\+\.[0-9]\+$//')"

          case "$OP_MODEL" in
            OP-ACE-5-ULTRA-6.6.50|OP-ACE-5-PRO-6.6.30|OP13-6.6.30|OP13-CPH-6.6.56)
              FENGCHI_DIR="$KERNEL_PATCHES_FOLDER/oneplus/hmbird/deprecated" ;;
            *)
              FENGCHI_DIR="$KERNEL_PATCHES_FOLDER/oneplus/hmbird" ;;
          esac

          dos2unix "$FENGCHI_DIR/fengchi_${HMBIRD_MODEL}_${OP_OS_VERSION}.patch"
          patch -p1 -F 3 < "$FENGCHI_DIR/fengchi_${HMBIRD_MODEL}_${OP_OS_VERSION}.patch"

          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/overwriter.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/overwriter.patch"

          chmod +x ./drivers/of/overwriter/overwrite_configs/convert_configs.sh || true

          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/hmbird_config.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/hmbird_config.patch"
        else
          echo "Hmbird not enabled, skipping fengchi patch"
        fi

        echo "✅ Other patches applied"
        echo "::endgroup::"

    - name: 🔧 Add ADIOS I/O Scheduler
      shell: bash
      if: ${{ inputs.enable_adios == true || inputs.enable_adios == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Add ADIOS I/O Scheduler"

        cd "$COMMON_KERNEL_FOLDER"

        if [ -z "${ADIOS_PATCHES_FOLDER:-}" ]; then
          echo "::error::ADIOS_PATCHES_FOLDER is not set"
          exit 1
        fi

        if [ ! -d "$ADIOS_PATCHES_FOLDER" ]; then
          echo "::error::ADIOS patches folder not found: $ADIOS_PATCHES_FOLDER"
          exit 1
        fi

        PATCH_FILE=""

        case "${KERNEL_VER}" in
          "6.6")
            PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.6.patch"
            ;;
          "6.1")
            if [ "${TKERNEL_VER:-}" = "6.1.115" ] \
              && { [[ "${OP_BRANCH:-}" == *mt* ]] || [[ "${OP_SOC:-}" == *dimensity* ]] \
                || [[ "${OP_SOC:-}" == *mediatek* ]] || [[ "${OP_SOC:-}" == *mt* ]]; }; then
              PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.1_mt6989.patch"
            elif [ "${TKERNEL_VER:-}" = "6.1.57" ] || [ "${TKERNEL_VER:-}" = "6.1.75" ]; then
              PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.1_old.patch"
            else
              PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.1.patch"
            fi
            ;;
          *)
            echo "::warning::ADIOS only configured for 6.1 and 6.6. Current: ${KERNEL_VER}"
            echo "::endgroup::"
            exit 0
            ;;
        esac

        if [ ! -f "$PATCH_FILE" ]; then
          echo "::error::ADIOS patch not found: $PATCH_FILE"
          find "$ADIOS_PATCHES_FOLDER" -maxdepth 3 -type f -iname "*adios*" -print || true
          exit 1
        fi

        if [ -f "block/adios.c" ]; then
          echo "ADIOS source already exists. Skipping."
        else
          cp "$PATCH_FILE" ./adios.patch

          if patch -p1 --ignore-whitespace -F 3 < adios.patch 2>&1 | tee /tmp/adios_patch.log; then
            echo "ADIOS patch applied successfully"
          else
            echo "::warning::ADIOS patch reported an issue"
            if grep -q "malformed patch" /tmp/adios_patch.log; then
              patch -p1 --force --ignore-whitespace < adios.patch || true
            fi
            if find . -name "*.rej" -print -quit | grep -q .; then
              echo "::error::ADIOS patch failed. Reject files:"
              find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
              exit 1
            fi
          fi

          rm -f adios.patch
        fi

        DEFCONFIG="$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"

        if ! grep -q "^CONFIG_MQ_IOSCHED_ADIOS=" "$DEFCONFIG"; then
          {
            echo "CONFIG_MQ_IOSCHED_ADIOS=y"
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y"
          } >> "$DEFCONFIG"
        fi

        echo "✅ ADIOS I/O scheduler setup completed"
        echo "::endgroup::"

    - name: Apply NTSync Patch
      shell: bash
      if: ${{ env.OP_NTSYNC == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply NTSync patch"

        cd "$COMMON_KERNEL_FOLDER"

        NTSYNC_FOLDER="$KERNEL_PATCHES_FOLDER/common/ntsync"
        GKI_KEY="${ANDROID_VER}-${KERNEL_VER}"
        NTSYNC_PATCH=""

        case "$OP_MODEL" in
          OP10r|OP-ACE-2-5.10.209|OP-ACE-2V-5.10.209|OP-PAD-MT6983-5.10.209|\
          OP10pro-5.10.209|OP10t-5.10.209|OP-ACE-5.10.209|OP11r-5.10.209|\
          OP-NORD-3-5.10.209|OP-ACE-RACE-5.10.209)
            if [[ "$OP_OS_VERSION" == "OOS15" ]]; then
              NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_android12-5.10_OOS14.patch"
            fi
            ;;
        esac

        if [ -n "$NTSYNC_PATCH" ]; then
          [ -f "$NTSYNC_PATCH" ] || {
            echo "::error::NTSync compat patch not found: $(basename "$NTSYNC_PATCH")"
            exit 1
          }
        elif [ -f "$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}_${OP_OS_VERSION}.patch" ]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}_${OP_OS_VERSION}.patch"
        elif [ -f "$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}.patch" ]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}.patch"
        else
          echo "::error::NTSync patch not found for ${GKI_KEY} / ${OP_MODEL} / ${OP_OS_VERSION}"
          exit 1
        fi

        if [ "$ANDROID_VER" = "android16" ] && [ "$KERNEL_VER" = "6.12" ]; then
          rm -f include/uapi/linux/ntsync.h drivers/misc/ntsync.c
        fi

        patch -p1 --forward < "$NTSYNC_PATCH"
        patch -p1 --forward < "$NTSYNC_FOLDER/ntsync_base.patch"

        echo "CONFIG_NTSYNC=y" >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"

        echo "✅ NTSync patch applied"
        echo "::endgroup::"

    - name: Apply Unicode Fix Patch
      shell: bash
      if: ${{ env.OP_UNICODE == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply Unicode Fix patch"

        cd "$COMMON_KERNEL_FOLDER"

        KERNEL_VERSION="$KERNEL_VER"
        MIN_VERSION="5.16"

        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/unicode_bypass_fix_6.1-.patch"
        else
          patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/unicode_bypass_fix_6.1+.patch"
        fi

        echo "::endgroup::"

    - name: Add Tmpfs Support
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<'EOF'
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF

    - name: Add BBR
      if: ${{ env.OP_BBR == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add BBR"
    
        {
          echo "CONFIG_TCP_CONG_ADVANCED=y"
          echo "CONFIG_TCP_CONG_BBR=y"
          echo "CONFIG_TCP_CONG_BBR3=y"
          echo "CONFIG_NET_SCH_FQ=y"
          echo "CONFIG_NET_SCH_FQ_CODEL=y"
          echo "CONFIG_NET_SCH_CAKE=y"
          echo "CONFIG_NET_SCH_PIE=y"
          echo "CONFIG_NET_SCH_FQ_PIE=y"
        } >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
    
        cd "$COMMON_KERNEL_FOLDER"
    
        PATCH_BASE_URL="https://raw.githubusercontent.com/Bouteillepleine/kernel_patches/main/common/bbrv3"
    
        case "${ANDROID_VER}-${KERNEL_VER}" in
          android12-5.10)
            PATCH_NAME="0001-net-tcp-backport-BBRv3-to-android12-5.10.patch" ;;
          android13-5.15)
            PATCH_NAME="0001-net-tcp-backport-BBRv3-to-android13-5.15.patch" ;;
          android14-6.1)
            PATCH_NAME="0001-net-tcp-backport-BBRv3-to-android14-6.1.patch" ;;
          android15-6.6)
            PATCH_NAME="0001-net-tcp-backport-BBRv3-to-android15-6.6.patch" ;;
          android16-6.12)
            PATCH_NAME="0001-net-tcp-backport-BBRv3-to-android16-6.12.patch" ;;
          *)
            echo "ERROR: no known BBRv3 patch mapping for ${ANDROID_VER}-${KERNEL_VER}"
            exit 1 ;;
        esac
    
        PATCH_URL="$PATCH_BASE_URL/$PATCH_NAME"
        echo "Using BBRv3 patch URL: $PATCH_URL"
    
        PF="$(mktemp /tmp/bbrv3_XXXXXX.patch)"
        trap 'rm -f "$PF"' EXIT
        curl -fsSL "$PATCH_URL" -o "$PF"
        patch -p1 --forward -F 3 < "$PF"
    
        # ---- Android 12 / 5.10 sysctl compatibility (unchanged) ----
        if [ "$ANDROID_VER" = "android12" ] && [ "$KERNEL_VER" = "5.10" ]; then
          if ! grep -qF 'int proc_dou8vec_minmax(' ./include/linux/sysctl.h; then
            SYSCTL_ADD_PATCH="$(mktemp /tmp/sysctl_add_XXXXXX.patch)"
            SYSCTL_FIX_PATCH="$(mktemp /tmp/sysctl_fix_XXXXXX.patch)"
            trap 'rm -f "$PF" "$SYSCTL_ADD_PATCH" "$SYSCTL_FIX_PATCH"' EXIT
            curl -fsSL "$PATCH_BASE_URL/sysctl_add_proc_dou8vec_minmax.patch" -o "$SYSCTL_ADD_PATCH"
            curl -fsSL "$PATCH_BASE_URL/sysctl_fix_data-races_in_proc_dou8vec_minmax.patch" -o "$SYSCTL_FIX_PATCH"
            patch -p1 --forward -F 3 < "$SYSCTL_ADD_PATCH"
            patch -p1 --forward -F 3 < "$SYSCTL_FIX_PATCH"
          else
            echo "proc_dou8vec_minmax already exists; skipping sysctl compatibility patches"
          fi
        fi
    
        echo "✅ BBRv3 applied (KMI-safe)"
        echo "::endgroup::"
    
    - name: Add TTL Target Support
      if: ${{ env.OP_TTL == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<'EOF'
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF

    - name: Add IP SET & IPv6_NAT Support
      if: ${{ env.OP_IP_SET == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        cd "$COMMON_KERNEL_FOLDER"

        if [[ "$KERNEL_VER" == "6.12" ]] || [[ "$OP_BRANCH" == wild/mt* ]]; then
          echo "::debug::Skipping CONFIG_BPF_STREAM_PARSER for $KERNEL_VER / $OP_BRANCH"
        else
          echo "CONFIG_BPF_STREAM_PARSER=y" >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
        fi

        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<'EOF'
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_SET=y
        CONFIG_IP6_NF_NAT=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y
        EOF

        patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/common/IPv6_NAT_FIX.patch"

    - name: Add Droidspaces support
      shell: bash
      if: ${{ env.OP_DS == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Add Droidspaces Support"

        cd "$COMMON_KERNEL_FOLDER"

        case "$OP_BRANCH" in
          wild/sm8850|wild/sm8845)
            patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/fix_sysvipc_kabi_a16-6.12.patch"
            ;;
          wild/sm8550|wild/sm7550)
            patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/fix_sysvipc_kabi_1_2_3.patch"
            ;;
          wild/sm8450|wild/sm8475|wild/mt6895|wild/mt6983|wild/mt6789)
            if [ "$ANDROID_VER" = "android12" ] && [ "$KERNEL_VER" = "5.10" ]; then
              patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/fix_sysvipc_kabi_bypass_a16-6.12_below.patch"
              patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/fix_abi_padding_for_posix_mqueue.patch"
            else
              patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/fix_sysvipc_kabi_6_7_8.patch"
            fi
            ;;
          *)
            patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/fix_sysvipc_kabi_6_7_8.patch"
            ;;
        esac

        patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/droidspaces/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch"

        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<'EOF'
        CONFIG_SYSVIPC=y
        CONFIG_DEVTMPFS=y
        CONFIG_PID_NS=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_NETFILTER_XT_TARGET_REJECT=y
        CONFIG_NETFILTER_XT_TARGET_LOG=y
        CONFIG_NETFILTER_XT_MATCH_RECENT=y
        EOF

        if [ "${OP_RUST_BUILD:-false}" = "true" ]; then
          if ! grep -q 'EXPORT_SYMBOL.*put_ipc_ns' "$COMMON_KERNEL_FOLDER/ipc/namespace.c"; then
            printf '\nEXPORT_SYMBOL_GPL(put_ipc_ns);\n' >> "$COMMON_KERNEL_FOLDER/ipc/namespace.c"
          fi
          if ! grep -q 'EXPORT_SYMBOL.*init_ipc_ns' "$COMMON_KERNEL_FOLDER/ipc/msgutil.c"; then
            printf '\nEXPORT_SYMBOL_GPL(init_ipc_ns);\n' >> "$COMMON_KERNEL_FOLDER/ipc/msgutil.c"
          fi
        fi

        echo "✅ Droidspaces Support applied"
        echo "::endgroup::"

    - name: Add Build based configs
      shell: bash
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<'EOF'
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
        CONFIG_OPTIMIZE_INLINING=y
        CONFIG_FRAME_WARN=0
        CONFIG_TRACEPOINTS=y
        CONFIG_DEBUG_KERNEL=n
        CONFIG_DEBUG_INFO=n
        CONFIG_DEBUG_INFO_DWARF4=n
        CONFIG_LOCK_DEBUGGING=n
        CONFIG_DEBUG_MUTEXES=n
        CONFIG_DEBUG_SPINLOCK=n
        CONFIG_DEBUG_ATOMIC_SLEEP=n
        CONFIG_GDB_SCRIPTS=n
        EOF

    - name: Add RUST build configs
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: |
        set -euo pipefail
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<'EOF'
        CONFIG_ANDROID_BINDER_IPC_RUST=m
        CONFIG_RUST=y
        EOF

    - name: Customize Kernel Branding
      shell: bash
      run: |
        set -euo pipefail
        cd "$COMMON_KERNEL_FOLDER"
        mkdir -p out
        CUSTOM_LOCALVERSION="-${ANDROID_VER}-${OP_UNAME}"
        echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"

    - name: Disable GPUEB
      shell: bash
      if: ${{ env.KERNEL_VER == '5.10' && (startsWith(env.OP_SOC, 'dimensity') || startsWith(env.OP_SOC, 'helio')) }}
      run: |
        set -euo pipefail
        echo "Disabling GPUEB for MTK kernel 5.10"
        sed -i '/obj-y.*gpueb/d' "$COMMON_KERNEL_FOLDER/drivers/gpu/mediatek/Makefile"

    - name: Build Kernel
      id: build_kernel_step
      shell: bash
      env:
        PYTHONWARNINGS: "ignore:invalid escape sequence"
      run: |
        set -euo pipefail
        echo "::group::Build kernel with ccache optimization"

        cd "$COMMON_KERNEL_FOLDER"
        : > "$COMMON_KERNEL_FOLDER/.scmversion"

        export PYTHONWARNINGS="${PYTHONWARNINGS}"

        COMMIT_TIMESTAMP="$(git log -1 --format=%ct 2>/dev/null || date +%s)"
        COMMIT_HASH="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"

        WORKSPACE="${GITHUB_WORKSPACE}"
        MAP="-fdebug-prefix-map=${WORKSPACE}=."
        MPMAP="-fmacro-prefix-map=${WORKSPACE}=."
        FPMAP="-ffile-prefix-map=${WORKSPACE}=."

        export KCFLAGS="${KCFLAGS:-} $MAP $MPMAP $FPMAP -no-canonical-prefixes -fdiagnostics-color=never -Qunused-arguments -Wno-unused-command-line-argument -D__ANDROID_COMMON_KERNEL__"
        export KCPPFLAGS="${KCPPFLAGS:-} $MAP $MPMAP $FPMAP"

        export LLVM=1 LLVM_IAS=1
        export ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export PAHOLE="$KERNEL_PLATFORM_FOLDER/prebuilts/kernel-build-tools/linux-x86/bin/pahole"
        export LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
        export OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

        set +u
        source "$KERNEL_PLATFORM_FOLDER/build/kernel/_setup_env.sh" 2>/dev/null || true
        set -u
        
        if [[ ! "${NPROC:-}" =~ ^[1-9][0-9]*$ ]]; then
          echo "::warning::NPROC not set or invalid ('${NPROC:-}'), falling back to nproc --all"
          NPROC="$(nproc --all)"
        fi
        echo "Build parallelism: $NPROC threads"

        cat > "$COMMON_KERNEL_FOLDER/ld-wrapper" <<'EOF'
        #!/bin/bash
        exec ld.lld "$@" \
          --thinlto-cache-dir="${LDCACHE_DIR}" \
          --thinlto-jobs="${NPROC}"
        EOF
        chmod +x "$COMMON_KERNEL_FOLDER/ld-wrapper"

        export SOURCE_DATE_EPOCH="$COMMIT_TIMESTAMP"

        if [ -n "${{ inputs.build_timestamp }}" ]; then
          EFFECTIVE_TS="${{ inputs.build_timestamp }}"
          echo "📅 Using custom build timestamp: $EFFECTIVE_TS"
        else
          EFFECTIVE_TS="$(date -u '+%a %b %d %H:%M:%S UTC %Y')"
          echo "📅 Using current UTC build timestamp: $EFFECTIVE_TS"
        fi

        export KBUILD_BUILD_TIMESTAMP="$EFFECTIVE_TS"

        {
          echo "EFFECTIVE_BUILD_TIMESTAMP=$EFFECTIVE_TS"
          echo "BUILD_TIMESTAMP=$EFFECTIVE_TS"
        } >> "$GITHUB_ENV"

        export KBUILD_BUILD_USER="${BUILD_USER:-OnePlus}"
        export KBUILD_BUILD_HOST="${BUILD_HOST:-ubuntu-build}"
        export KBUILD_BUILD_VERSION=1

        echo "SOURCE_DATE_EPOCH: $SOURCE_DATE_EPOCH"
        echo "Source commit:     $COMMIT_HASH"
        echo "Build timestamp:   $KBUILD_BUILD_TIMESTAMP"
        echo "Build user:        $KBUILD_BUILD_USER"
        echo "Build host:        $KBUILD_BUILD_HOST"

        export CC="ccache clang"
        export CXX="ccache clang++"
        export HOSTCC="ccache clang"
        export HOSTCXX="ccache clang++"

        sanitize_ccache_env() {
          unset CCACHE_DEPEND          || true
          unset CCACHE_READONLY_DIRECT || true
          unset CCACHE_COMPRESSION     || true
          unset CCACHE_COMPRESSION_LEVEL || true
          unset CCACHE_FILE_CLONE      || true
          unset CCACHE_INODE_CACHE     || true

          export CCACHE_COMPILERCHECK=content
          export CCACHE_COMPRESS=true
          export CCACHE_COMPRESSLEVEL=3
          export CCACHE_DIRECT=true
          export CCACHE_FILECLONE=true
          export CCACHE_INODECACHE=true
          export CCACHE_NOREADONLY_DIRECT=true
          export CCACHE_NOHASHDIR=true
          export CCACHE_IGNOREOPTIONS="--sysroot*"
        }

        sanitize_ccache_env

        if env | grep -q '^CCACHE_DEPEND='; then
          echo "::error::CCACHE_DEPEND is still set during build"
          exit 1
        fi

        if env | grep -q '^CCACHE_READONLY_DIRECT='; then
          echo "::error::CCACHE_READONLY_DIRECT is still set during build"
          exit 1
        fi

        OUT=out
        mkdir -p "$OUT"

        echo "============================================"
        echo "Compiler and ccache verification"
        echo "============================================"
        echo "which clang: $(which clang)"
        clang --version 2>&1 | head -n1 || true
        echo ""
        echo "ccache configuration:"
        sanitize_ccache_env
        ccache -p | grep -E "(compression|direct_mode|read_only_direct|readonly_direct|depend|sloppiness|file_clone|inode_cache)" || true

        if env | grep -q '^CCACHE_DEPEND='; then
          echo "::error::CCACHE_DEPEND is still set during ccache verification"
          exit 1
        fi

        if env | grep -q '^CCACHE_READONLY_DIRECT='; then
          echo "::error::CCACHE_READONLY_DIRECT is still set during ccache verification"
          exit 1
        fi

        echo ""
        echo "ccache pre-build stats:"
        sanitize_ccache_env
        ccache -s | head -n 30 || true
        echo "============================================"

        sanitize_ccache_env
        make \
          LD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
          HOSTLD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
          O="$OUT" \
          gki_defconfig

        LOCAL_LOCALVERSION="${CUSTOM_LOCALVERSION:--OP-WILD}"

        if [ -n "${LOCAL_LOCALVERSION:-}" ]; then
          scripts/config --file "$OUT/.config" --set-str LOCALVERSION "${LOCAL_LOCALVERSION}"
          scripts/config --file "$OUT/.config" -d LOCALVERSION_AUTO || true
          sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' scripts/setlocalversion || true
        fi

        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE -e CC_OPTIMIZE_FOR_PERFORMANCE_O3
          KCFLAGS_EXTRA="-O3"
        else
          scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE -d CC_OPTIMIZE_FOR_PERFORMANCE_O3
          KCFLAGS_EXTRA="-O2"
        fi

        case "$OP_BRANCH" in
          wild/sm8750|wild/sm8850|wild/sm8845)
            KCFLAGS_EXTRA="-mcpu=oryon-1 ${KCFLAGS_EXTRA}"
            ;;
        esac

        scripts/config --file "$OUT/.config" \
          -e LTO_CLANG \
          -d LTO_CLANG_NONE \
          -d LTO_CLANG_THIN \
          -d LTO_CLANG_FULL

        case "$OP_LTO" in
          none) scripts/config --file "$OUT/.config" -e LTO_CLANG_NONE ;;
          thin) scripts/config --file "$OUT/.config" -e LTO_CLANG_THIN ;;
          full) scripts/config --file "$OUT/.config" -e LTO_CLANG_FULL ;;
          *)
            echo "::error::Unsupported LTO option: $OP_LTO"
            exit 1
            ;;
        esac

        disable_list=(
          CONFIG_REGMAP_KUNIT
          CONFIG_INPUT_KUNIT_TEST
          CONFIG_SND_SOC_TOPOLOGY_KUNIT_TEST
          CONFIG_SND_SOC_UTILS_KUNIT_TEST
          CONFIG_HID_KUNIT_TEST
          CONFIG_RTC_LIB_KUNIT_TEST
          CONFIG_CLK_KUNIT_TEST
          CONFIG_CLK_GATE_KUNIT_TEST
          CONFIG_IIO_FORMAT_KUNIT_TEST
          CONFIG_EXT4_KUNIT_TESTS
          CONFIG_FAT_KUNIT_TEST
        )

        for sym in "${disable_list[@]}"; do
          scripts/config --file "$OUT/.config" -d "$sym" 2>/dev/null || true
        done

        sanitize_ccache_env
        make \
          LD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
          HOSTLD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
          O="$OUT" \
          olddefconfig

        KCFLAGS="$KCFLAGS -Wno-error -pipe ${KCFLAGS_EXTRA}"
        KCPPFLAGS="$KCPPFLAGS -DCONFIG_OPTIMIZE_INLINING"

        echo "============================================"
        echo "Build Configuration"
        echo "============================================"
        echo "Device:       ${OP_MODEL}"
        echo "Kernel:       ${KERNEL_FULL_VER}"        
        echo "Threads:      ${NPROC}"
        echo "Optimization: ${{ inputs.optimize_level }}"
        echo "LTO:          $OP_LTO"
        echo "Timestamp:    $KBUILD_BUILD_TIMESTAMP"
        echo "KCFLAGS:      ${KCFLAGS:0:180}..."
        echo "KCPPFLAGS:    ${KCPPFLAGS:0:180}..."
        echo "============================================"

        echo "Running make prepare for cache warm-up..."
        sanitize_ccache_env
        make \
          LD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
          HOSTLD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
          O="$OUT" \
          prepare 2>&1 | tail -n 10 || true

        sanitize_ccache_env

        BUILD_START="$(date +%s)"
        set -o pipefail
        
        run_make() {
          sanitize_ccache_env
          make \
            LD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
            HOSTLD="$COMMON_KERNEL_FOLDER/ld-wrapper" \
            -j"${NPROC}" \
            O="$OUT" \
            KCFLAGS="$KCFLAGS" \
            KCPPFLAGS="$KCPPFLAGS" \
            "$@"
        }

        if [ "${{ inputs.debug }}" = "true" ]; then
          run_make Image modules 2>&1 | tee build.log
          run_make INSTALL_MOD_PATH="$OUT/install" modules_install 2>&1 | tee install.log

          cp build.log    "$DEBUG_ARTIFACTS_FOLDER/build.log"
          cp install.log  "$DEBUG_ARTIFACTS_FOLDER/install.log"
          cp "$OUT/vmlinux"        "$DEBUG_ARTIFACTS_FOLDER/vmlinux"        2>/dev/null || true
          cp "$OUT/Module.symvers" "$DEBUG_ARTIFACTS_FOLDER/Module.symvers" 2>/dev/null || true
          cp "$OUT/System.map"     "$DEBUG_ARTIFACTS_FOLDER/System.map"     2>/dev/null || true

          if [ -d "$OUT/install/lib/modules" ]; then
            rsync -av "$OUT/install/lib/modules"/*/ "$DEBUG_ARTIFACTS_FOLDER/" || true
          fi
        else
          run_make Image 2>&1 | tee build.log
        fi

        BUILD_END="$(date +%s)"
        BUILD_TIME=$((BUILD_END - BUILD_START))

        {
          echo "BUILD_START=$BUILD_START"
          echo "BUILD_END=$BUILD_END"
          echo "BUILD_TIME=$BUILD_TIME"
        } >> "$GITHUB_ENV"

        IMG="$OUT/arch/arm64/boot/Image"

        if [ ! -f "$IMG" ]; then
          echo "::error::Kernel Image missing after build"
          tail -n 100 build.log || true
          exit 1
        fi

        IMG_SIZE="$(stat -c%s "$IMG")"

        echo "✅ Build completed"
        echo "   Duration: $((BUILD_TIME / 60))m $((BUILD_TIME % 60))s"
        echo "   Threads:  ${NPROC}"
        echo "   Image:    $(numfmt --to=iec-i --suffix=B "$IMG_SIZE")"

        echo ""
        echo "ccache post-build stats:"
        sanitize_ccache_env
        ccache -s || true

        echo "::endgroup::"

    - name: 📊 ccache Post-Build Statistics
      id: ccache_stats
      if: ${{ success() && (inputs.clean == false || inputs.clean == 'false') }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::ccache final statistics"

        export CCACHE_DIR="${{ env.CCACHE_DIR }}"

        sanitize_ccache_env() {
          unset CCACHE_DEPEND || true
          unset CCACHE_READONLY_DIRECT || true
          unset CCACHE_COMPRESSION || true
          unset CCACHE_COMPRESSION_LEVEL || true
          unset CCACHE_FILE_CLONE || true
          unset CCACHE_INODE_CACHE || true

          export CCACHE_COMPILERCHECK=content
          export CCACHE_COMPRESS=true
          export CCACHE_COMPRESSLEVEL=3
          export CCACHE_DIRECT=true
          export CCACHE_FILECLONE=true
          export CCACHE_INODECACHE=true
          export CCACHE_NOREADONLY_DIRECT=true
          export CCACHE_NOHASHDIR=true
          export CCACHE_IGNOREOPTIONS="--sysroot*"
        }

        sanitize_ccache_env
        ccache -c || true

        sanitize_ccache_env
        ccache --evict-older-than 10800s || true

        if [ "${{ inputs.debug }}" = "true" ] && [ -f "${CCACHE_LOGFILE:-}" ]; then
          LOG_DIR="$(dirname "$CCACHE_LOGFILE")"
          NEW_LOG_NAME="${OP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_ccache.log"
          mv "$CCACHE_LOGFILE" "$LOG_DIR/$NEW_LOG_NAME"
          echo "CCACHE_LOGFILE=$LOG_DIR/$NEW_LOG_NAME" >> "$GITHUB_ENV"
        fi

        sanitize_ccache_env
        STATS="$(ccache -s || true)"

        CACHEABLE="$(echo "$STATS" | awk '/Cacheable calls:/ {match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH)}' | head -n1)"
        HITS="$(echo "$STATS"      | awk '/^[[:space:]]*Hits:/ {match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH)}' | head -n1)"
        DIRECT="$(echo "$STATS"    | awk '/Direct:/ {match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH)}' | head -n1)"

        if [ "${CACHEABLE:-0}" -gt 0 ]; then
          HIT_RATE="$(awk -v h="${HITS:-0}" -v c="$CACHEABLE" 'BEGIN{printf "%.1f",(h/c)*100}')"
          DIRECT_RATE="$(awk -v d="${DIRECT:-0}" -v c="$CACHEABLE" 'BEGIN{printf "%.1f",(d/c)*100}')"
        else
          HIT_RATE="0.0"
          DIRECT_RATE="0.0"
        fi

        {
          echo "hit_rate=${HIT_RATE}%"
          echo "direct_rate=${DIRECT_RATE}%"
        } >> "$GITHUB_OUTPUT"

        {
          echo "## 📊 ccache Statistics"
          echo ""
          echo '```'
          sanitize_ccache_env
          ccache -s || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

        echo "::endgroup::"

    - name: Collect Build Stats / Validate Image
      id: collect_stats
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Collect Build stats"

        DEFAULT_IMAGE="$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image"
        DIST_IMAGE="$KERNEL_PLATFORM_FOLDER/out/${ANDROID_VER}-${KERNEL_VER}/dist/Image"
        BAZEL_IMAGE="$KERNEL_PLATFORM_FOLDER/bazel-bin/common/kernel_aarch64/Image"

        IMG="$DEFAULT_IMAGE"
        [ -f "$DIST_IMAGE"  ] && IMG="$DIST_IMAGE"
        [ -f "$BAZEL_IMAGE" ] && IMG="$BAZEL_IMAGE"

        echo "Selected Image: $IMG"

        WARNINGS_COUNT="0"
        if [ -f "$COMMON_KERNEL_FOLDER/build.log" ]; then
          WARNINGS_COUNT="$(grep -ciE '\bwarning:' "$COMMON_KERNEL_FOLDER/build.log" || true)"
          [ -n "$WARNINGS_COUNT" ] || WARNINGS_COUNT="0"
        fi

        if [ ! -f "$IMG" ]; then
          echo "::error::Kernel Image not found: $IMG"
          find "$KERNEL_PLATFORM_FOLDER" -type f -name Image -print 2>/dev/null | head -n 20 || true
          exit 1
        fi

        if ! file "$IMG" | grep -qi 'ARM64'; then
          echo "::error::Image is not ARM64 format"
          file "$IMG"
          exit 1
        fi

        IMG_SIZE="$(stat -c %s "$IMG")"
        MIN_SIZE=6102400

        if [ "$IMG_SIZE" -lt "$MIN_SIZE" ]; then
          echo "::error::Image size too small: $(numfmt --to=iec-i --suffix=B "$IMG_SIZE")"
          exit 1
        fi

        IMG_SHA256="$(sha256sum "$IMG" | awk '{print $1}')"
        BUILD_TIME="${BUILD_TIME:-0}"

        KERNEL_UNAME="$(strings "$IMG" | grep -E 'Linux version.*#' | tail -n1 || true)"

        {
          echo "KERNEL_UNAME=$KERNEL_UNAME"
          echo "FINAL_IMAGE_PATH=$IMG"
        } >> "$GITHUB_ENV"

        {
          echo "warnings_count=$WARNINGS_COUNT"
          echo "image_sha256=$IMG_SHA256"
          echo "build_time=$BUILD_TIME"
        } >> "$GITHUB_OUTPUT"

        echo "Kernel Uname: $KERNEL_UNAME"
        echo "Warnings:     $WARNINGS_COUNT"
        echo "Image size:   $(numfmt --to=iec-i --suffix=B "$IMG_SIZE")"
        echo "SHA256:       $IMG_SHA256"
        echo "Build time:   ${BUILD_TIME}s"
        echo "::endgroup::"

    - name: Save Build Metadata
      id: save_metadata
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Save Build Metadata"

        if [ -n "${EFFECTIVE_BUILD_TIMESTAMP:-}" ]; then
          final_ts="$EFFECTIVE_BUILD_TIMESTAMP"
        elif [ -n "${BUILD_TIMESTAMP:-}" ]; then
          final_ts="$BUILD_TIMESTAMP"
        elif [ -n "${{ inputs.build_timestamp }}" ]; then
          final_ts="${{ inputs.build_timestamp }}"
        else
          final_ts="$(date -u '+%a %b %d %H:%M:%S UTC %Y')"
        fi

        {
          echo "kernel_version=${KERNEL_FULL_VER:-unknown}"
          echo "ksu_version=${KSUVER:-unknown}"
          echo "ksu_type=${{ inputs.ksu_type }}"
          echo "build_timestamp=$final_ts"
        } >> "$GITHUB_OUTPUT"

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          echo "susfs_version=${SUSVER:-unknown}" >> "$GITHUB_OUTPUT"
        else
          echo "susfs_version=none" >> "$GITHUB_OUTPUT"
        fi

        echo "✅ Metadata saved"
        echo "::endgroup::"

    - name: Download Latest SUSFS Module from CI
      if: ${{ env.OP_SUSFS == 'true' }}
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        echo "::group::Download Latest SUSFS Module from CI"

        REPO="sidex15/susfs4ksu-module"
        BRANCH="v1.5.2+"
        MODULE_NAME="ksu_module_susfs_1.5.2+_CI.zip"

        mkdir -p "$AK3_FOLDER"
        MODULE_PATH="$AK3_FOLDER/$MODULE_NAME"

        LATEST_RUN_ID="$(
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/runs?status=success&per_page=50" |
          jq -r --arg branch "$BRANCH" '
            .workflow_runs[] | select(.head_branch == $branch) | .id
          ' | head -n 1
        )"

        if [ -z "$LATEST_RUN_ID" ] || [ "$LATEST_RUN_ID" = "null" ]; then
          echo "::warning::No successful run found for branch $BRANCH"
          echo "::endgroup::"
          exit 0
        fi

        ARTIFACT_URL="$(
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${LATEST_RUN_ID}/artifacts" |
          jq -r '.artifacts[] | select(.expired == false) | .archive_download_url' |
          head -n 1
        )"

        if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
          echo "::warning::Failed to fetch artifact URL"
          echo "::endgroup::"
          exit 0
        fi

        if curl -fL \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -o "$MODULE_PATH" \
          "$ARTIFACT_URL"; then

          FILE_SIZE="$(stat -c%s "$MODULE_PATH" 2>/dev/null || echo 0)"

          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "::warning::Downloaded module ZIP too small: ${FILE_SIZE} bytes"
            rm -f "$MODULE_PATH"
            echo "::endgroup::"
            exit 0
          fi

          if unzip -l "$MODULE_PATH" | grep -q 'module.prop'; then
            echo "MODULE_DOWNLOADED=true" >> "$GITHUB_ENV"
            echo "MODULE_SOURCE=CI"       >> "$GITHUB_ENV"
            echo "✅ Valid SUSFS module ZIP downloaded"
          else
            echo "::warning::Downloaded ZIP does not contain module.prop"
          fi
        else
          echo "::warning::Failed to download artifact"
        fi

        echo "::endgroup::"

    - name: Create Kernel ZIP
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Create kernel ZIP package"

        IMAGE_PATH="$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image"

        if [ -f "$KERNEL_PLATFORM_FOLDER/out/$OP_ANDROID_VERSION-$OP_KERNEL_VERSION/dist/Image" ]; then
          IMAGE_PATH="$KERNEL_PLATFORM_FOLDER/out/$OP_ANDROID_VERSION-$OP_KERNEL_VERSION/dist/Image"
        elif [ -f "$KERNEL_PLATFORM_FOLDER/bazel-bin/common/kernel_aarch64/Image" ]; then
          IMAGE_PATH="$KERNEL_PLATFORM_FOLDER/bazel-bin/common/kernel_aarch64/Image"
        fi

        if [ ! -f "$IMAGE_PATH" ]; then
          echo "::error::Built Image not found at: $IMAGE_PATH"
          exit 1
        fi

        cp "$IMAGE_PATH" "$AK3_FOLDER/Image"
        mv "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt" "$AK3_FOLDER/"
        cd "$AK3_FOLDER"

        sed -i 's/do.check_boot_version=.*/do.check_boot_version=1/' anykernel.sh

        ZIP_MODEL="$(echo "$OP_MODEL" | sed 's/-[0-9]\+\.[0-9]\+\.[0-9]\+$//')"

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          ZIP_NAME="AK3_${ZIP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_${{ inputs.ksu_type }}_${KSUVER:-unknown}_SuSFS_${SUSVER:-unknown}.zip"
        else
          ZIP_NAME="AK3_${ZIP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_${{ inputs.ksu_type }}_${KSUVER:-unknown}.zip"
        fi

        mkdir -p "$ARTIFACTS_FOLDER"

        if ! zip -r9 "$ZIP_NAME" ./* \
             -x "*.git*" -x "$ZIP_NAME" -x "README.md" 2>&1 | tee /tmp/zip.log; then
          echo "::error::Failed to create ZIP package"
          exit 1
        fi

        mv "$ZIP_NAME" "$ARTIFACTS_FOLDER/"
        find "$ARTIFACTS_FOLDER" -maxdepth 1 -type f ! -name "$ZIP_NAME" -delete

        ZIP_SIZE="$(stat -c%s "$ARTIFACTS_FOLDER/$ZIP_NAME")"
        ZIP_SHA256="$(sha256sum "$ARTIFACTS_FOLDER/$ZIP_NAME" | awk '{print $1}')"

        printf 'zip_sha256=%s\n' "$ZIP_SHA256" >> "$GITHUB_OUTPUT"
        echo "zip_name=$ZIP_NAME"              >> "$GITHUB_OUTPUT"
        echo "ZIP_NAME=$ZIP_NAME"              >> "$GITHUB_ENV"

        echo "✅ Kernel ZIP created"
        echo "   Name:   $ZIP_NAME"
        echo "   Size:   $(numfmt --to=iec-i --suffix=B "$ZIP_SIZE")"
        echo "   SHA256: $ZIP_SHA256"
        echo "::endgroup::"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail

        KSU_SHA="${KSU_COMMIT_SHA:-unknown}"
        SUSFS_SHA="${SUSFS_COMMIT_SHA:-unknown}"
        SUSFS_REF_LOCAL="${SUSFS_REF:-unknown}"
        FINAL_TIMESTAMP="${EFFECTIVE_BUILD_TIMESTAMP:-${BUILD_TIMESTAMP:-${{ steps.save_metadata.outputs.build_timestamp }}}}"

        {
          echo "Model: ${{ env.OP_MODEL }}"
          echo "OS Version: ${{ env.OP_OS_VERSION }}"
          echo "Android: ${{ env.ANDROID_VER }}"
          echo "Kernel base: ${{ env.KERNEL_VER }}"
          echo "Kernel full: ${{ env.KERNEL_FULL_VER }}"
          echo "Kernel Uname: ${{ env.KERNEL_UNAME }}"
          echo "Build Timestamp: $FINAL_TIMESTAMP"
          echo "Build User: ${{ env.BUILD_USER }}"
          echo "Build Host: ${{ env.BUILD_HOST }}"
          echo "ReSukiSU Version: ${KSUVER:-unknown}"
          echo "ReSukiSU commit SHA: ${KSU_SHA}"

          if [ "${OP_SUSFS:-false}" = "true" ]; then
            echo "SUSFS Version: ${SUSVER:-unknown}"
            echo "SUSFS ref: $SUSFS_REF_LOCAL"
            echo "SUSFS commit SHA: $SUSFS_SHA"
          fi

          echo "Optimization: ${{ inputs.optimize_level }}"
          echo "Clean Build: ${{ inputs.clean }}"
          echo ""
          echo "=== OnePlus Features ==="
          echo "BBR: ${{ env.OP_BBR }}"
          echo "BBG: ${{ env.OP_BBG }}"
          echo "HMBIRD SCX: ${{ env.OP_HMBIRD }}"
          echo "TTL: ${{ env.OP_TTL }}"
          echo "IP_SET & IPv6 NAT: ${{ env.OP_IP_SET }}"
          echo "Unicode Fix: ${{ env.OP_UNICODE }}"
          echo "NTSync: ${{ env.OP_NTSYNC }}"
          echo "Droidspaces: ${{ env.OP_DS }}"
          echo "ADIOS I/O Scheduler: ${{ inputs.enable_adios }}"
          echo ""
          echo "Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo "AnyKernel3 ZIP SHA256: ${{ steps.create_zip.outputs.zip_sha256 }}"
          echo "Compiler: ${CLANG_VERSION:-unknown}"
          echo "Warnings Count: ${{ steps.collect_stats.outputs.warnings_count }}"
          echo "Build Time: ${{ steps.collect_stats.outputs.build_time }}s"

          if [ "${{ inputs.clean }}" = "false" ]; then
            echo "ccache Hit Rate: ${{ steps.ccache_stats.outputs.hit_rate }}"
            echo "ccache Direct Rate: ${{ steps.ccache_stats.outputs.direct_rate }}"
          else
            echo "ccache: Disabled (clean build)"
          fi

          echo "Artifact Name: ${{ env.ZIP_NAME }}"
        } | tee summary.txt

        {
          echo "### 🎯 Kernel Build Summary"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **Model** | ${{ env.OP_MODEL }} |"
          echo "| **OS Version** | ${{ env.OP_OS_VERSION }} |"
          echo "| **Kernel Version** | ${{ steps.save_metadata.outputs.kernel_version }} |"
          echo "| **Kernel Uname** | \`${{ env.KERNEL_UNAME }}\` |"
          echo "| **Build Timestamp** | \`${FINAL_TIMESTAMP}\` |"
          echo "| **Build User** | ${{ env.BUILD_USER }} |"
          echo "| **Build Host** | ${{ env.BUILD_HOST }} |"
          echo "| **ReSukiSU Version** | ${KSUVER:-unknown} |"

          if [ "$KSU_SHA" != "unknown" ]; then
            echo "| **ReSukiSU Commit** | [\`${KSU_SHA:0:8}\`](https://github.com/ReSukiSU/ReSukiSU/commit/$KSU_SHA) |"
          else
            echo "| **ReSukiSU Commit** | unknown |"
          fi

          if [ "${OP_SUSFS:-false}" = "true" ]; then
            echo "| **SUSFS Version** | ${SUSVER:-unknown} |"
            echo "| **SUSFS Ref** | \`${SUSFS_REF_LOCAL}\` |"

            if [ "$SUSFS_SHA" != "unknown" ]; then
              echo "| **SUSFS Commit** | [\`${SUSFS_SHA:0:8}\`](https://gitlab.com/simonpunk/susfs4ksu/-/commit/$SUSFS_SHA) |"
            else
              echo "| **SUSFS Commit** | unknown |"
            fi
          fi

          echo ""
          echo "### 🔧 OnePlus Features"
          echo ""
          echo "| Feature | Status |"
          echo "|---------|--------|"
          echo "| **BBR** | ${{ env.OP_BBR }} |"
          echo "| **BBG** | ${{ env.OP_BBG }} |"
          echo "| **HMBIRD SCX** | ${{ env.OP_HMBIRD }} |"
          echo "| **TTL** | ${{ env.OP_TTL }} |"
          echo "| **IP_SET & IPv6 NAT** | ${{ env.OP_IP_SET }} |"
          echo "| **Unicode Fix** | ${{ env.OP_UNICODE }} |"
          echo "| **NTSync** | ${{ env.OP_NTSYNC }} |"
          echo "| **Droidspaces** | ${{ env.OP_DS }} |"
          echo "| **ADIOS I/O Scheduler** | ${{ inputs.enable_adios }} |"

          echo ""
          echo "### 📊 Build Metrics"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **Optimization** | ${{ inputs.optimize_level }} |"
          echo "| **Clean Build** | ${{ inputs.clean }} |"
          echo "| **Build Time** | ${{ steps.collect_stats.outputs.build_time }}s |"

          if [ "${{ inputs.clean }}" = "false" ]; then
            echo "| **ccache Hit Rate** | ${{ steps.ccache_stats.outputs.hit_rate }} |"
            echo "| **ccache Direct Rate** | ${{ steps.ccache_stats.outputs.direct_rate }} |"
          fi

          echo "| **Image SHA256** | \`${{ steps.collect_stats.outputs.image_sha256 }}\` |"
          echo "| **Warnings** | ${{ steps.collect_stats.outputs.warnings_count }} |"
          echo "| **Compiler** | \`${CLANG_VERSION:-unknown}\` |"
          echo "| **Artifact Name** | \`${{ env.ZIP_NAME }}\` |"
          echo "| **AnyKernel3 SHA256** | \`${{ steps.create_zip.outputs.zip_sha256 }}\` |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Debug Artifacts
      if: ${{ always() && !cancelled() && inputs.debug == 'true' }}
      continue-on-error: true
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.DEBUG_ZIP_NAME }}
        path: ${{ env.DEBUG_ARTIFACTS_FOLDER }}
        compression-level: 9
        retention-days: 90

    - name: Upload Artifacts
      if: ${{ success() && steps.create_zip.conclusion == 'success' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ARTIFACTS_FOLDER }}/${{ env.ZIP_NAME }}
        archive: false
        compression-level: 0
        retention-days: 90

    - name: Upload ccache log
      if: ${{ success() && inputs.debug == 'true' && steps.build_kernel_step.conclusion == 'success' }}
      uses: actions/upload-artifact@v7
      with:
        name: "${{ env.OP_MODEL }}_${{ env.OP_OS_VERSION }}_${{ env.KERNEL_FULL_VER }}_ccache.log"
        path: |
          ${{ env.CCACHE_LOGFILE }}
          ${{ github.workspace }}/${{ env.OP_MODEL }}_${{ env.OP_OS_VERSION }}_${{ env.KERNEL_FULL_VER }}_ccache.log
        archive: false
        compression-level: 0
        retention-days: 90
        if-no-files-found: ignore

    - name: 📥 Checkout Code
      uses: actions/checkout@v6
      if: ${{ always() && steps.build_kernel_step.conclusion == 'success' }}
      with:
        path: main-source
        fetch-depth: 1

    - name: Normalize ccache before saving
      if: ${{ always() && steps.build_kernel_step.conclusion == 'success' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Normalize ccache before saving"

        unset CCACHE_DEPEND              || true
        unset CCACHE_READONLY_DIRECT     || true
        unset CCACHE_COMPRESSION         || true
        unset CCACHE_COMPRESSION_LEVEL   || true
        unset CCACHE_FILE_CLONE          || true
        unset CCACHE_INODE_CACHE         || true

        {
          echo "CCACHE_COMPILERCHECK=content"
          echo "CCACHE_COMPRESS=true"
          echo "CCACHE_COMPRESSLEVEL=3"
          echo "CCACHE_DIRECT=true"
          echo "CCACHE_FILECLONE=true"
          echo "CCACHE_INODECACHE=true"
          echo "CCACHE_NOREADONLY_DIRECT=true"
          echo "CCACHE_NOHASHDIR=true"
          echo "CCACHE_IGNOREOPTIONS=--sysroot*"
        } >> "$GITHUB_ENV"

        if [ -d "${CCACHE_DIR:-}" ]; then
          echo "ccache directory: $CCACHE_DIR"
          echo "Size before cleanup:"
          du -sh "$CCACHE_DIR" || true

          ccache -c || true
          ccache --evict-older-than 10800s || true

          echo "Size after cleanup:"
          du -sh "$CCACHE_DIR" || true
        else
          echo "No ccache directory found."
        fi

        echo "::endgroup::"

    - name: Save ccache cache
      if: ${{ always() && steps.build_kernel_step.conclusion == 'success' }}
      continue-on-error: true
      uses: ./action-source/.github/actions/cache/save
      with:
        cache_path: ${{ env.CCACHE_DIR }}
        cache_key: ${{ inputs.ksu_type }}-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
        cache_bucket: "ccache-cache"
        debug: true
        github_token: ${{ inputs.github_token }}
        working_dir: "./main-source"
        compression_level: 3

    - name: Trim LTO LD cache before saving
      if: ${{ always() && env.OP_LTO != 'none' && steps.build_kernel_step.conclusion == 'success' }}
      continue-on-error: true
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Trim LTO LD cache before saving"

        if [ -d "${LDCACHE_DIR:-}" ]; then
          echo "LTO cache directory: $LDCACHE_DIR"
          echo "Size before trim:"
          du -sh "$LDCACHE_DIR" || true

          find "$LDCACHE_DIR" -type f -mmin +360 -delete || true
          find "$LDCACHE_DIR" -type d -empty -delete     || true

          echo "Size after trim:"
          du -sh "$LDCACHE_DIR" || true
        else
          echo "No LTO cache directory found."
        fi

        echo "::endgroup::"

    - name: Save LTO LD cache
      if: ${{ always() && env.OP_LTO != 'none' && steps.build_kernel_step.conclusion == 'success' }}
      continue-on-error: true
      uses: ./action-source/.github/actions/cache/save
      with:
        cache_path: ${{ env.LDCACHE_DIR }}
        cache_key: ${{ inputs.ksu_type }}-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
        cache_bucket: "lto-cache"
        debug: true
        github_token: ${{ inputs.github_token }}
        working_dir: "./main-source"
        compression_level: 1

    - name: 🧹 Cleanup on failure
      if: ${{ failure() }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup on failure"

        echo "Build failed — cleaning up large temporary artifacts to free runner disk space"
        
        if [ -d "${COMMON_KERNEL_FOLDER:-}/out" ]; then
          echo "Removing build output: $COMMON_KERNEL_FOLDER/out"
          rm -rf "$COMMON_KERNEL_FOLDER/out" || true
        fi
        
        if [ -d "${SUSFS_FOLDER:-}" ]; then
          echo "Removing SUSFS sources: $SUSFS_FOLDER"
          rm -rf "$SUSFS_FOLDER" || true
        fi
        
        if [ -d "${KERNEL_PATCHES_FOLDER:-}" ]; then
          echo "Removing kernel patches: $KERNEL_PATCHES_FOLDER"
          rm -rf "$KERNEL_PATCHES_FOLDER" || true
        fi
        
        rm -f /tmp/sukisu_setup_*.sh /tmp/bbg_setup_*.sh /tmp/clone_log_* || true
        
        echo ""
        echo "Disk usage after cleanup:"
        df -h "$GITHUB_WORKSPACE" || true

        echo "::endgroup::"
